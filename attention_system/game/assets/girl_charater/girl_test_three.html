<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Girl Mechanic - three.js GLB Animation Test</title>
  <style>
    body { margin: 0; font-family: sans-serif; overflow: hidden; }
    #overlay {
      position: absolute; left: 10px; top: 10px; z-index: 10; background: rgba(255,255,255,0.9);
      padding: 10px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    select, button, label { margin: 3px 0; display: block; }
    #info { font-size: 12px; color: #333; }
  </style>
</head>
<body>
  <div id="overlay">
    <div><strong>Girl Mechanic - Animation Tester</strong></div>
    <div id="info">Loading...</div>
    <label for="animSelect">Animation</label>
    <select id="animSelect"></select>
    <button id="playBtn">Play</button>
    <button id="stopBtn">Stop</button>
    <label>Speed: <input id="speed" type="range" min="0" max="2" step="0.01" value="1"></label>
  </div>

  <script type="module">
    // Use esm.sh which rewrites internal bare imports so the browser can resolve them
    import * as THREE from 'https://esm.sh/three@0.152.0';
    import { OrbitControls } from 'https://esm.sh/three@0.152.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://esm.sh/three@0.152.0/examples/jsm/loaders/GLTFLoader.js';

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9fbff0);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, -25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.0, 0);
    controls.update();

    // Lights
    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    hemi.position.set(0, 20, 0);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(5, 10, 7.5);
    dir.castShadow = true;
    dir.shadow.camera.top = 10;
    dir.shadow.camera.bottom = -10;
    dir.shadow.camera.left = -10;
    dir.shadow.camera.right = 10;
    scene.add(dir);

    // Ground
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshPhongMaterial({ color: 0x808080, depthWrite: false }));
    ground.rotation.x = - Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // UI elements
    const info = document.getElementById('info');
    const animSelect = document.getElementById('animSelect');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const speed = document.getElementById('speed');

    let mixer = null;
    let model = null;
    let activeAction = null;
    const actions = {};

    const clock = new THREE.Clock();

    // Load GLB
    const loader = new GLTFLoader();
    const modelPath = 'girl_mechanic.glb';
    loader.load(modelPath, gltf => {
      model = gltf.scene;
      model.position.set(0, 0, 0);
      model.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });
      scene.add(model);

      // Setup animations
      if (gltf.animations && gltf.animations.length) {
        mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach((clip, idx) => {
          // Use clip.name as label; if empty, fallback to index
          const name = clip.name || 'anim_' + idx;
          actions[name] = mixer.clipAction(clip);
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          animSelect.appendChild(opt);
        });
        // Try to select requested animations by name if present
        info.textContent = 'Loaded. Available animations: ' + Object.keys(actions).join(', ');
        // Auto-select root|Girl_run
        const runKey = 'root|Girl_run';
        if (actions[runKey]) {
          animSelect.value = runKey;
          actions[runKey].setLoop(THREE.LoopRepeat, Infinity);
        } else {
          animSelect.selectedIndex = 0;
        }
        playSelected();
      } else {
        info.textContent = 'Model loaded but no animations found.';
      }
    }, xhr => {
      info.textContent = 'Loading model: ' + Math.round((xhr.loaded / xhr.total) * 100) + '%';
    }, err => {
      console.error(err);
      info.textContent = 'Error loading model. See console.';
    });

    function playSelected() {
      const name = animSelect.value;
      if (!name || !actions[name]) return;
      if (activeAction === actions[name]) {
        actions[name].play();
        return;
      }
      // Fade out previous
      if (activeAction) {
        activeAction.fadeOut(0.2);
      }
      activeAction = actions[name];
      activeAction.reset();
      activeAction.fadeIn(0.2);
      activeAction.play();
    }

    playBtn.addEventListener('click', () => {
      if (!mixer) return;
      if (activeAction) {
        activeAction.paused = false;
      } else {
        playSelected();
      }
    });

    stopBtn.addEventListener('click', () => {
      if (!mixer) return;
      if (activeAction) {
        activeAction.stop();
      }
    });

    animSelect.addEventListener('change', () => {
      playSelected();
    });

    speed.addEventListener('input', () => {
      const s = parseFloat(speed.value);
      if (mixer) mixer.timeScale = s;
    });

    // Resize
    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (mixer) mixer.update(dt);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
