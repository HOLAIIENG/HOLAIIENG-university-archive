<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>梦核跑酷</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100; pointer-events: none; text-align: center;
            opacity: 0; transition: opacity 1s ease 0.5s;
        }
        #ui.visible { opacity: 1; }
        .score-row { display: flex; align-items: center; justify-content: center; gap: 24px; }
        .energy-bar-container {
            width: 300px; height: 20px; background: rgba(255,255,255,0.15);
            margin-top: 15px; border-radius: 10px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(0,242,255,0.3);
            transition: box-shadow 0.5s ease;
        }
        #attn-bar {
            width: 30%; height: 100%;
            background: linear-gradient(90deg, #ff6b6b 0%, #ffd93d 50%, #6bcf7f 100%);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(0,255,136,0.25);
        }
        .controls {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 12px; z-index: 100;
            opacity: 0; transition: opacity 1s ease 2.5s;
        }
        .controls.visible { opacity: 1; }
        #algorithm-data {
            position: absolute; top: 20px; right: 20px;
            color: rgba(255,255,255,0.3); font-size: 10px;
            text-align: right; z-index: 100; pointer-events: none;
            font-family: monospace; opacity: 0; transition: opacity 1s ease 1s;
        }
        #algorithm-data.visible { opacity: 1; }
        #algorithm-data div { margin-bottom: 2px; }
        #reminder {
            position: absolute; top: 32%; left: 50%;
            color: rgba(245,225,255,0.95); font-size: 24px; font-weight: 500;
            text-shadow: 0 0 12px rgba(200,160,220,0.4), 0 0 30px rgba(180,140,210,0.25);
            z-index: 200; pointer-events: none;
            opacity: 0; letter-spacing: 3px; white-space: nowrap;
            padding: 6px 20px; border-radius: 24px;
            background: radial-gradient(ellipse at center, rgba(180,140,210,0.12) 0%, transparent 70%);
        }
        #reminder.show { opacity: 1; }
        .score-montage {
            position: absolute; top: 32%; left: 50%;
            font-size: 26px; font-weight: 600; line-height: 1; padding: 0 6px;
            pointer-events: none; opacity: 0; z-index: 300;
            text-align: center; letter-spacing: 1px; background: transparent;
        }
        .score-montage.show { opacity: 1; }
        .score-montage.pos { color: rgba(180,220,180,0.92); text-shadow: 0 0 10px rgba(150,210,160,0.35); }
        .score-montage.neg { color: rgba(230,170,175,0.92); text-shadow: 0 0 10px rgba(210,150,160,0.35); }

        /* 左侧金币进度条 */
        #coin-bar-wrap {
            position: fixed; left: 28px; top: 50%; transform: translateY(-50%);
            width: 22px; height: 260px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 11px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            overflow: hidden; z-index: 100;
            opacity: 0; transition: opacity 1s ease 1s;
            box-shadow: 0 0 20px rgba(255,215,0,0.05), inset 0 0 12px rgba(0,0,0,0.3);
        }
        #coin-bar-wrap.visible { opacity: 1; }
        #coin-bar-fill {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 0%;
            background: linear-gradient(to top, #ff8c00, #ffd700, #fff4b0);
            border-radius: 0 0 10px 10px;
            transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 12px rgba(255,215,0,0.4), 0 -4px 16px rgba(255,180,0,0.3);
        }
        #coin-bar-fill::after {
            content: ''; position: absolute; top: 0; left: 2px; right: 2px; height: 6px;
            background: rgba(255,255,255,0.5); border-radius: 3px;
            filter: blur(2px);
        }
        #coin-bar-label {
            position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: rgba(255,215,0,0.7); white-space: nowrap;
            font-family: monospace; text-shadow: 0 0 6px rgba(255,215,0,0.3);
        }
        #coin-bar-pct {
            position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
            font-size: 12px; color: rgba(255,215,0,0.8); font-weight: 700;
            font-family: monospace; text-shadow: 0 0 8px rgba(255,215,0,0.4);
        }

        /* 飞行金币粒子（2D） */
        .flying-coin-dot {
            position: fixed; width: 10px; height: 10px; border-radius: 50%;
            background: radial-gradient(circle, #fff4b0, #ffd700);
            box-shadow: 0 0 8px rgba(255,215,0,0.8), 0 0 16px rgba(255,180,0,0.4);
            pointer-events: none; z-index: 350;
        }

        /* 金币弹出文字 */
        .coin-popup {
            position: absolute; pointer-events: none; z-index: 350;
            font-size: 22px; font-weight: 700; color: #ffd700;
            text-shadow: 0 0 8px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.3);
            opacity: 0;
        }

        /* 模拟面板 */
        #sim-panel {
            position: fixed; bottom: 20px; left: 20px; z-index: 400;
            display: flex; align-items: center; gap: 0;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; backdrop-filter: blur(8px);
            padding: 4px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; max-width: 42px;
        }
        #sim-panel:hover {
            max-width: 340px; background: rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.15); box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        #sim-toggle {
            width: 34px; height: 34px; border-radius: 50%; border: none;
            background: rgba(200,160,255,0.15); color: rgba(255,255,255,0.6);
            font-size: 14px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        #sim-toggle:hover { background: rgba(200,160,255,0.3); color: #fff; }
        #sim-expand {
            display: flex; align-items: center; gap: 6px;
            padding: 0 8px 0 6px; white-space: nowrap;
            opacity: 0; transition: opacity 0.3s ease 0.1s;
        }
        #sim-panel:hover #sim-expand { opacity: 1; }
        .sim-btn {
            padding: 4px 10px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.55);
            border-radius: 12px; cursor: pointer; font-size: 10px;
            font-family: monospace; transition: all 0.15s;
        }
        .sim-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .sim-btn.active { background: rgba(200,160,255,0.25); border-color: rgba(200,160,255,0.5); color: #fff; }
        #sim-val-display { font-family: monospace; font-size: 11px; color: rgba(200,180,255,0.6); min-width: 28px; text-align: center; }

        /* 开场 */
        #intro {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 50% 60%, #1a0a2e 0%, #0d0518 60%, #000 100%);
            transition: opacity 0.8s ease;
        }
        #intro.hidden { opacity: 0; pointer-events: none; }
        #intro h1 {
            font-size: clamp(36px, 8vw, 72px); font-weight: 200; letter-spacing: 0.4em; color: #f0d0ff;
            text-shadow: 0 0 40px rgba(200,140,255,0.4); margin-bottom: 16px; opacity: 0;
            animation: introTitleIn 1.2s ease-out 0.3s forwards;
        }
        #intro p {
            font-size: clamp(12px, 2.5vw, 16px); color: rgba(220,180,255,0.5); letter-spacing: 0.2em;
            opacity: 0; animation: introSubIn 1s ease-out 1s forwards;
        }
        #intro .start-btn {
            margin-top: 48px; padding: 14px 48px;
            background: rgba(200,140,255,0.12); border: 1px solid rgba(200,140,255,0.3);
            color: #e8c8ff; font-size: 18px; letter-spacing: 0.3em;
            border-radius: 40px; cursor: pointer; opacity: 0;
            animation: introBtnIn 0.8s ease-out 1.6s forwards; transition: all 0.3s ease; font-family: inherit;
        }
        #intro .start-btn:hover { background: rgba(200,140,255,0.25); border-color: rgba(200,140,255,0.6); box-shadow: 0 0 30px rgba(180,120,255,0.3); transform: scale(1.05); }
        @keyframes introTitleIn { from { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(8px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }
        @keyframes introSubIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 0.5; transform: translateY(0); } }
        @keyframes introBtnIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #intro .intro-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        #intro .intro-particles span { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(200,150,255,0.6), transparent); animation: floatUp linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-20vh) scale(1); opacity: 0; } }
        #pause-overlay { position: fixed; inset: 0; z-index: 500; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        #pause-overlay.active { display: flex; }
        #pause-overlay span { font-size: 48px; font-weight: 200; color: rgba(220,180,255,0.7); letter-spacing: 0.5em; }
    </style>
</head>
<body>
    <div id="intro">
        <div class="intro-particles" id="intro-particles"></div>
        <h1>DREAMCORE</h1>
        <p>用注意力驱动你的梦境</p>
        <button class="start-btn" id="start-btn">开始奔跑</button>
    </div>
    <div id="pause-overlay"><span>已暂停</span></div>

    <div id="ui">
        <div style="font-size: 16px; letter-spacing: 3px; font-weight: bold;">DREAMCORE RUNNER</div>
        <div class="score-row" style="margin-top: 8px;">
            <div style="font-size: 28px; font-weight: bold;">Score: <span id="score-val">0</span></div>
            <div style="font-size: 22px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.4);">🪙 <span id="coin-val">0</span></div>
        </div>
        <div class="energy-bar-container"><div id="attn-bar"></div></div>
        <div style="margin-top: 8px; font-size: 14px; opacity: 0.9;">⚡ Attn: <span id="attn-top">0</span>%</div>
    </div>

    <!-- 左侧金币进度条 -->
    <div id="coin-bar-wrap">
        <div id="coin-bar-fill"></div>
        <div id="coin-bar-pct">0%</div>
        <div id="coin-bar-label">🪙 0/100</div>
    </div>

    <div id="algorithm-data">
        <div>GyroX: <span id="gyro-x">0.00</span></div>
        <div>GyroY: <span id="gyro-y">0.00</span></div>
        <div>GyroZ: <span id="gyro-z">0.00</span></div>
        <div>Attn: <span id="attn-val">0.00</span></div>
        <div>CursorX: <span id="cursor-x">0</span></div>
        <div>CursorY: <span id="cursor-y">0</span></div>
    </div>
    <div id="reminder"></div>
    <div id="sim-panel">
        <button id="sim-toggle">⚡</button>
        <div id="sim-expand">
            <span id="sim-val-display">--</span>
            <button class="sim-btn active" data-mode="off">OFF</button>
            <button class="sim-btn" data-mode="low">LOW</button>
            <button class="sim-btn" data-mode="high">HIGH</button>
            <button class="sim-btn" data-mode="auto">AUTO</button>
        </div>
    </div>
    <div class="controls" id="controls-hint">← → / A D - 左右移动 | Space - 跳跃 | P - 暂停</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/VignetteShader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

    <script>
        // ==================== 核心变量 ====================
        let scene, camera, renderer, composer, player, playerGroup;
        let score = 0, coinCount = 0, focusValue = 30;
        let currentLane = 0;
        let obstacles = [], decorations = [], coins = [];
        let hitCooldown = 0, isFlashing = false, isJumping = false;
        let lastAttnTick = performance.now();
        const attnTickInterval = 1000;
        let smoothSpeed = 0.18;
        const MIN_SPEED = 0.15, SPEED_LERP_FACTOR = 0.08;
        let lastObstacleTime = 0;
        const OBSTACLE_INTERVAL = 1500;
        let lastCoinTime = 0;
        let gameStarted = false;
        let isAwakened = false; // 场景觉醒状态

        // 算法数据
        let gyroscope_x = 0, gyroscope_y = 0, gyroscope_z = 0, attention_value = 0;
        let focus_area_width = 0, focus_area_height = 0, focus_area_x = 0, focus_area_y = 0;
        let focus_x = 0, focus_y = 0;
        let filtered_focus_x = 0, filtered_focus_y = 0;
        const FOCUS_EMA_ALPHA_X = 0.3, FOCUS_EMA_ALPHA_Y = 0.6;
        let isPaused = false;

        // 模拟注意力
        let simMode = 'off', simAttnValue = 30, simAttnTarget = 30, simLastTick = 0;
        const SIM_TICK_INTERVAL = 800, SIM_LERP_SPEED = 0.04;

        // WebSocket
        let ws = null;
        const WS_URL = 'ws://localhost:8765';
        let wsConnected = false;
        let skyMesh = null;

        // 粒子系统
        let jumpParticleSystem = null, dustParticles = null;
        let dustData = [];

        // 残影
        const afterimages = [];
        const AFTERIMAGE_COUNT = 6;
        let afterimageTimer = 0;

        // 地面参数
        const BLOCK_SIZE = 4, BLOCK_GAP = 0.3;
        const BLOCK_HEIGHT_MIN = 0.2, BLOCK_HEIGHT_MAX = 1.0, GROUND_WIDTH = 60;
        const LANE_X_POSITIONS = [-4, 0, 4];
        const BLOCK_COLORS = [0xffd1dc, 0xf0b8c8, 0xe8a0b8, 0xffc4d6, 0xf5d0e0, 0xeecccc];
        const segmentLength = 40, aheadRange = 60, behindRange = 40;
        const groundSegments = [];
        const laneSegments = { '-4': [], '0': [], '4': [] };

        // 共享金币几何体/材质
        let coinGeo, coinMat, coinMatLarge, coinMatRare;

        // ==================== 开场粒子 ====================
        (function () {
            const c = document.getElementById('intro-particles');
            if (!c) return;
            for (let i = 0; i < 30; i++) {
                const s = document.createElement('span');
                const sz = 3 + Math.random() * 6;
                s.style.width = sz + 'px'; s.style.height = sz + 'px';
                s.style.left = Math.random() * 100 + '%';
                s.style.animationDuration = (6 + Math.random() * 10) + 's';
                s.style.animationDelay = (Math.random() * 8) + 's';
                c.appendChild(s);
            }
        })();

        // ==================== 模拟面板 ====================
        document.querySelectorAll('.sim-btn').forEach(btn => {
            btn.addEventListener('click', () => setSimMode(btn.dataset.mode));
        });

        function setSimMode(mode) {
            simMode = mode;
            document.querySelectorAll('.sim-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            if (mode === 'low') { simAttnValue = 15; simAttnTarget = 15; }
            if (mode === 'high') { simAttnValue = 65; simAttnTarget = 65; }
            if (mode === 'auto') { simAttnValue = 50; simAttnTarget = 50; }
            const d = document.getElementById('sim-val-display');
            if (d) d.textContent = mode === 'off' ? '--' : mode.toUpperCase();
        }

        // ==================== 开始游戏 ====================
        document.getElementById('start-btn').addEventListener('click', startGame);

        function startGame() {
            if (gameStarted) return;
            gameStarted = true;
            document.getElementById('intro').classList.add('hidden');
            setTimeout(() => { document.getElementById('intro').style.display = 'none'; }, 800);
            document.getElementById('ui').classList.add('visible');
            document.getElementById('controls-hint').classList.add('visible');
            document.getElementById('algorithm-data').classList.add('visible');
            document.getElementById('coin-bar-wrap').classList.add('visible');

            camera.position.set(0, 25, playerGroup.position.z + 10);
            gsap.to(camera.position, { y: 5, duration: 2.0, ease: "power3.inOut" });
            playerGroup.position.y = -3;
            gsap.to(playerGroup.position, { y: 0, duration: 1.5, ease: "elastic.out(1, 0.6)", delay: 0.5 });
            gsap.from(playerGroup.rotation, { y: Math.PI * 4, duration: 1.5, ease: "power2.out", delay: 0.5 });
            const origEI = player.material.emissiveIntensity;
            gsap.to(player.material, {
                emissiveIntensity: 3.0, duration: 0.3, delay: 1.2,
                onComplete: () => { gsap.to(player.material, { emissiveIntensity: origEI, duration: 0.6 }); }
            });
        }

        // ==================== 初始化 ====================
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xd8b5ff, 6, 50);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            createSky();

            // 共享金币资源
            coinGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.08, 16);
            coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.5, metalness: 0.8, roughness: 0.2 });
            coinMatLarge = new THREE.MeshStandardMaterial({ color: 0xff8c00, emissive: 0xff6600, emissiveIntensity: 0.6, metalness: 0.8, roughness: 0.2 });
            coinMatRare = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00cc99, emissiveIntensity: 0.8, metalness: 0.9, roughness: 0.1 });

            // 玩家组
            playerGroup = new THREE.Group();
            playerGroup.position.set(0, 0, 0);
            scene.add(playerGroup);

            player = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 0.8, 8, 16),
                new THREE.MeshLambertMaterial({ color: 0x87ceeb, emissive: 0x87ceeb, emissiveIntensity: 0.3 })
            );
            player.position.set(0, 1, 0);
            playerGroup.add(player);

            const glowGeo = new THREE.CircleGeometry(0.8, 32);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.rotation.x = -Math.PI / 2; glow.position.y = 0.02;
            playerGroup.add(glow);
            playerGroup._glow = glow;

            createAfterimages();
            initInfiniteGroundAndLanes();

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffeedd, 0.5);
            dirLight.position.set(5, 15, 10);
            scene.add(dirLight);

            const pLight = new THREE.PointLight(0xaaccff, 0.6, 12);
            pLight.position.set(0, 2, 0);
            playerGroup.add(pLight);
            playerGroup._pointLight = pLight;

            // 后期处理
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.4, 0.95));
            const vp = new THREE.ShaderPass(THREE.VignetteShader);
            vp.uniforms["offset"].value = 1.0; vp.uniforms["darkness"].value = 1.8;
            composer.addPass(vp);

            createJumpParticleSystem();
            createDustSystem();
            initWebSocket();
            animate();
        }

        // ==================== 残影 ====================
        function createAfterimages() {
            for (let i = 0; i < AFTERIMAGE_COUNT; i++) {
                const g = new THREE.Mesh(
                    new THREE.CapsuleGeometry(0.4, 0.8, 4, 16),
                    new THREE.MeshBasicMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.0, wireframe: true })
                );
                g.position.set(0, 1, 0);
                playerGroup.add(g);
                afterimages.push(g);
            }
        }

        // ==================== 跳跃粒子 ====================
        function createJumpParticleSystem() {
            const count = 60;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) { pos[i * 3 + 1] = -100; }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffd1dc, size: 0.15, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false });
            jumpParticleSystem = new THREE.Points(geo, mat);
            scene.add(jumpParticleSystem);
            jumpParticleSystem._velocities = [];
            jumpParticleSystem._lifetimes = [];
            for (let i = 0; i < count; i++) {
                jumpParticleSystem._velocities.push(new THREE.Vector3());
                jumpParticleSystem._lifetimes.push(0);
            }
            jumpParticleSystem._count = count;
        }

        function emitParticlesAt(worldPos, count, color, speed, life) {
            if (!jumpParticleSystem) return;
            const p = jumpParticleSystem.geometry.attributes.position.array;
            const c = jumpParticleSystem._count;
            let emitted = 0;
            for (let i = 0; i < c && emitted < count; i++) {
                if (jumpParticleSystem._lifetimes[i] <= 0) {
                    p[i * 3] = worldPos.x + (Math.random() - 0.5) * 0.5;
                    p[i * 3 + 1] = worldPos.y + (Math.random() - 0.5) * 0.5;
                    p[i * 3 + 2] = worldPos.z + (Math.random() - 0.5) * 0.5;
                    const a = Math.random() * Math.PI * 2, sp = speed * (0.5 + Math.random());
                    jumpParticleSystem._velocities[i].set(Math.cos(a) * sp, speed * (0.5 + Math.random()), Math.sin(a) * sp);
                    jumpParticleSystem._lifetimes[i] = life * (0.5 + Math.random() * 0.5);
                    emitted++;
                }
            }
            jumpParticleSystem.material.color.set(color);
            jumpParticleSystem.geometry.attributes.position.needsUpdate = true;
            setTimeout(() => { if (jumpParticleSystem) jumpParticleSystem.material.color.set(0xffd1dc); }, 600);
        }

        function emitJumpParticles() {
            emitParticlesAt(
                new THREE.Vector3(playerGroup.position.x, 0.3, playerGroup.position.z),
                30, 0xffd1dc, 2.5, 0.7
            );
        }

        function emitLandingParticles() {
            emitParticlesAt(
                new THREE.Vector3(playerGroup.position.x, 0.2, playerGroup.position.z),
                15, 0xffd1dc, 2, 0.4
            );
        }

        function updateJumpParticles(dt) {
            const pos = jumpParticleSystem.geometry.attributes.position.array;
            let any = false;
            for (let i = 0; i < jumpParticleSystem._count; i++) {
                if (jumpParticleSystem._lifetimes[i] > 0) {
                    any = true;
                    jumpParticleSystem._lifetimes[i] -= dt;
                    const v = jumpParticleSystem._velocities[i];
                    v.y -= 9.8 * dt;
                    pos[i * 3] += v.x * dt; pos[i * 3 + 1] += v.y * dt; pos[i * 3 + 2] += v.z * dt;
                    if (jumpParticleSystem._lifetimes[i] <= 0) pos[i * 3 + 1] = -100;
                }
            }
            jumpParticleSystem.geometry.attributes.position.needsUpdate = true;
            jumpParticleSystem.material.opacity = any ? 0.7 : 0;
        }

        // ==================== 扬尘粒子 ====================
        function createDustSystem() {
            const count = 60;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            dustData = [];
            for (let i = 0; i < count; i++) { pos[i * 3 + 1] = -100; dustData.push({ velocity: new THREE.Vector3(), lifetime: 0, maxLife: 0 }); }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffe0c0, size: 0.08, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false });
            dustParticles = new THREE.Points(geo, mat);
            scene.add(dustParticles);
        }

        let dustEmitTimer = 0;
        function updateDustParticles(dt) {
            if (!dustParticles) return;
            const pos = dustParticles.geometry.attributes.position.array;
            dustEmitTimer += dt;
            if (dustEmitTimer > 0.08 && gameStarted && !isPaused) {
                dustEmitTimer = 0;
                for (let i = 0; i < dustData.length; i++) {
                    if (dustData[i].lifetime <= 0) {
                        pos[i * 3] = playerGroup.position.x + (Math.random() - 0.5) * 1.2;
                        pos[i * 3 + 1] = 0.05 + Math.random() * 0.15;
                        pos[i * 3 + 2] = playerGroup.position.z + 0.5 + Math.random() * 0.5;
                        dustData[i].velocity.set((Math.random() - 0.5) * 0.3, 0.3 + Math.random() * 0.5, 0.5 + Math.random() * 0.5);
                        dustData[i].maxLife = 0.4 + Math.random() * 0.4;
                        dustData[i].lifetime = dustData[i].maxLife;
                        break;
                    }
                }
            }
            let any = false;
            for (let i = 0; i < dustData.length; i++) {
                if (dustData[i].lifetime > 0) {
                    any = true; dustData[i].lifetime -= dt;
                    const v = dustData[i].velocity; v.y -= 1.5 * dt;
                    pos[i * 3] += v.x * dt; pos[i * 3 + 1] += v.y * dt; pos[i * 3 + 2] += v.z * dt;
                    if (dustData[i].lifetime <= 0) pos[i * 3 + 1] = -100;
                }
            }
            dustParticles.geometry.attributes.position.needsUpdate = true;
            dustParticles.material.opacity = any ? 0.4 : 0;
        }

        // ==================== 天空球 ====================
        function createSky() {
            const geo = new THREE.SphereGeometry(400, 32, 32);
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x1a0533) }, midColor: { value: new THREE.Color(0xd8b5ff) },
                    bottomColor: { value: new THREE.Color(0xffd1dc) }, sunColor: { value: new THREE.Color(0xffaa66) },
                    sunY: { value: 0.15 }, offset: { value: 20 }, exponent: { value: 0.6 }, time: { value: 0 }
                },
                vertexShader: `varying vec3 vWP; void main(){ vWP=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
                fragmentShader: `
                    uniform vec3 topColor,midColor,bottomColor,sunColor; uniform float sunY,offset,exponent,time; varying vec3 vWP;
                    void main(){
                        float h=normalize(vWP+offset).y;
                        vec3 col=mix(bottomColor,midColor,clamp(pow(max(h,0.0),0.4)*2.0,0.0,1.0));
                        col=mix(col,topColor,clamp(pow(max(h-0.3,0.0),exponent),0.0,1.0));
                        col+=sunColor*exp(-abs(h-sunY)*8.0)*0.6;
                        float sn=fract(sin(dot(vWP.xz*0.1,vec2(12.9898,78.233)))*43758.5453);
                        if(h>0.5&&sn>0.995) col+=vec3(0.8,0.8,1.0)*(0.5+0.5*sin(time*2.0+sn*100.0))*0.5;
                        gl_FragColor=vec4(col,1.0);
                    }`,
                side: THREE.BackSide, depthWrite: false
            });
            skyMesh = new THREE.Mesh(geo, mat);
            scene.add(skyMesh);
        }

        // ==================== 障碍物 ====================

                case 1: obs = new THREE.Mesh(new THREE.OctahedronGeometry(0.7), new THREE.MeshLambertMaterial({ color: 0xc8a0ff, emissive: 0xb080ee, emissiveIntensity: 0.2 })); obs._spin = true; break;

        // ==================== 金币系统 ====================
        function spawnCoinGroup() {
            const attn = Math.min(100, Math.max(0, attention_value));
            const baseCount = attn < 20 ? 1 : attn < 50 ? 2 : attn < 80 ? 3 : 5;
            const count = baseCount + Math.floor(Math.random() * 2);
            const lane = Math.floor(Math.random() * 3) - 1;
            const startZ = playerGroup.position.z - 45 - Math.random() * 15;

            for (let i = 0; i < count; i++) {
                let cType, cMat, cValue, cScale, cColor;
                const r = Math.random();
                if (attn > 70 && r < 0.1) { cType = 'rare'; cMat = coinMatRare; cValue = 8; cScale = 0.6; cColor = '#00ffcc'; }
                else if (attn > 40 && r < 0.3) { cType = 'large'; cMat = coinMatLarge; cValue = 3; cScale = 0.55; cColor = '#ff8c00'; }
                else { cType = 'normal'; cMat = coinMat; cValue = 1; cScale = 0.45; cColor = '#ffd700'; }

                const coin = new THREE.Mesh(coinGeo, cMat);
                const yPos = 1.0 + Math.random() * 0.5;
                coin.position.set(lane * 4, -5, startZ - i * 2.5);
                coin.rotation.x = Math.PI / 2;
                scene.add(coin);
                coin._coinType = cType; coin._coinValue = cValue; coin._coinColor = cColor;
                coin._collected = false; coin._animating = false;
                coins.push(coin);

                gsap.to(coin.position, { y: yPos, duration: 0.8, ease: "power2.out", delay: i * 0.05 });
                coin.scale.set(0, 0, 0);
                gsap.to(coin.scale, { x: cScale, y: cScale, z: cScale, duration: 0.6, ease: "elastic.out(1, 0.5)", delay: i * 0.05 + 0.1 });
            }

        // ==================== 金币收集完整动画 ====================
        function collectCoinAnim(coin) {
            if (coin._animating) return;
            coin._collected = true;
            coin._animating = true;

            // 1) 粒子爆发
            emitParticlesAt(coin.position.clone(), 12, coin._coinColor === '#ffd700' ? 0xffd700 : coin._coinColor === '#ff8c00' ? 0xff8c00 : 0x00ffcc, 3, 0.5);

            // 2) 弹出文字
            showCoinPopup(coin._coinValue, coin._coinType);

            // 3) 更新数据
            coinCount += coin._coinValue;
            score += coin._coinValue;
            document.getElementById('coin-val').innerText = coinCount;
            document.getElementById('score-val').innerText = score;

            // 金币图标跳动
            gsap.fromTo(document.getElementById('coin-val'), { scale: 1.5 }, { scale: 1, duration: 0.3, ease: "elastic.out(1, 0.5)" });

            // 4) 3D飞行动画：金币 → 角色身边 → 屏幕左侧
            const playerPos = new THREE.Vector3(playerGroup.position.x, player.position.y + playerGroup.position.y, playerGroup.position.z);
            const midPoint = playerPos.clone().add(new THREE.Vector3(0, 1.5, 1));

            // 先吸到角色身边
            const tl = gsap.timeline();

            // 创建拖尾残影
            const trailClones = [];
            for (let t = 0; t < 4; t++) {
                const trail = new THREE.Mesh(coinGeo, new THREE.MeshBasicMaterial({
                    color: coin._coinColor === '#ffd700' ? 0xffd700 : coin._coinColor === '#ff8c00' ? 0xff8c00 : 0x00ffcc,
                    transparent: true, opacity: 0.4 - t * 0.1
                }));
                trail.position.copy(coin.position);
                trail.rotation.copy(coin.rotation);
                trail.scale.copy(coin.scale).multiplyScalar(0.8 - t * 0.15);
                scene.add(trail);
                trailClones.push({ mesh: trail, delay: t * 0.03 });
            }

            tl.to(coin.position, {
                x: midPoint.x, y: midPoint.y, z: midPoint.z,
                duration: 0.25, ease: "power2.in"
            });
            tl.to(coin.scale, { x: 0.2, y: 0.2, z: 0.2, duration: 0.25, ease: "power2.in" }, 0);
            tl.to(coin.rotation, { z: Math.PI * 4, duration: 0.25, ease: "power2.in" }, 0);

            // 拖尾跟随
            trailClones.forEach((tc, idx) => {
                tl.to(tc.mesh.position, {
                    x: midPoint.x, y: midPoint.y, z: midPoint.z,
                    duration: 0.2, ease: "power2.in"
                }, idx * 0.03);
                tl.to(tc.mesh, { opacity: 0, duration: 0.15 }, 0.1 + idx * 0.03);
            });

            // 5) 到达角色身边后，转为2D飞行光点飞向进度条
            tl.call(() => {
                // 清理3D拖尾
                trailClones.forEach(tc => { scene.remove(tc.mesh); tc.mesh.geometry = null; });

                // 获取金币在屏幕上的3D位置，投射到2D
                const screenPos = toScreenPosition(coin, camera);
                createFlyingCoinDot(screenPos.x, screenPos.y, coin._coinValue, coin._coinColor);
            });

            // 清理3D金币
            tl.call(() => {
                scene.remove(coin);
                const idx = coins.indexOf(coin);
                if (idx > -1) coins.splice(idx, 1);
            });

            // 更新进度条
            tl.call(() => { updateCoinBar(); }, null, '+=0.3');

            // 检查觉醒
            tl.call(() => { checkAwakening(); }, null, '+=0.1');
        }

        // 3D坐标转2D屏幕坐标
        function toScreenPosition(obj, cam) {
            const vector = new THREE.Vector3();
            obj.getWorldPosition(vector);
            vector.project(cam);
            return {
                x: (vector.x * 0.5 + 0.5) * window.innerWidth,
                y: (-vector.y * 0.5 + 0.5) * window.innerHeight
            };
        }

        // 2D飞行金点动画
        function createFlyingCoinDot(startX, startY, value, color) {
            // 目标：左侧进度条位置
            const barWrap = document.getElementById('coin-bar-wrap');
            const barRect = barWrap.getBoundingClientRect();
            const targetX = barRect.left + barRect.width / 2;
            const targetY = barRect.top + barRect.height * 0.5;

            // 创建多个飞行光点（散射效果）
            const dotCount = Math.min(value, 5);
            for (let i = 0; i < dotCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'flying-coin-dot';
                dot.style.left = startX + 'px';
                dot.style.top = startY + 'px';

                if (color !== '#ffd700') {
                    dot.style.background = `radial-gradient(circle, white, ${color})`;
                    dot.style.boxShadow = `0 0 8px ${color}80, 0 0 16px ${color}40`;
                }

                document.body.appendChild(dot);

                const offsetX = (Math.random() - 0.5) * 40;
                const offsetY = (Math.random() - 0.5) * 40;

                gsap.fromTo(dot,
                    { opacity: 0, scale: 0.3, x: 0, y: 0 },
                    { opacity: 1, scale: 1.2, duration: 0.1 }
                );
                gsap.to(dot, {
                    x: targetX - startX + offsetX,
                    y: targetY - startY + offsetY,
                    scale: 0.5,
                    duration: 0.5,
                    delay: 0.05 + i * 0.04,
                    ease: "power2.in",
                    onComplete: () => {
                        // 最终精确落入进度条
                        gsap.to(dot, {
                            x: targetX - startX,
                            y: targetY - startY,
                            scale: 0,
                            opacity: 0,
                            duration: 0.15,
                            ease: "power2.in",
                            onComplete: () => { dot.remove(); }
                        });
                    }
                });
            }

            // 进度条闪光反馈
            gsap.to('#coin-bar-fill', {
                boxShadow: '0 0 25px rgba(255,215,0,0.8), 0 -6px 20px rgba(255,180,0,0.6)',
                duration: 0.15, delay: 0.5,
                onComplete: () => {
                    gsap.to('#coin-bar-fill', {
                        boxShadow: '0 0 12px rgba(255,215,0,0.4), 0 -4px 16px rgba(255,180,0,0.3)',
                        duration: 0.4
                    });
                }
            });
        }

        function triggerAwakening(source) {
            if (isAwakened) return;
            isAwakened = true;

            console.log(`[觉醒] 触发来源: ${source}`);

            // 进度条满溢闪光动画

        // ==================== 无限地面 ====================
        function initInfiniteGroundAndLanes() {
            const minZ = 10 - aheadRange, maxZ = 10 + behindRange;
            for (let z = Math.floor(minZ / segmentLength) * segmentLength; z <= maxZ; z += segmentLength) {
                groundSegments.push(createGroundSegment(z, false));
                ['-4', '0', '4'].forEach(k => { laneSegments[k].push(createLaneSegment(parseInt(k), z)); });
            }
        }

        function createGroundSegment(centerZ, animateIn = false) {
            const group = new THREE.Group(); group.position.z = centerZ;
            const halfLen = segmentLength / 2, halfWidth = GROUND_WIDTH / 2;
            const colsX = Math.ceil(GROUND_WIDTH / BLOCK_SIZE), colsZ = Math.ceil(segmentLength / BLOCK_SIZE);
            const maxBC = colsX * colsZ;
            const baseMat = new THREE.MeshLambertMaterial({ color: 0xffd1dc });
            const tempGeo = new THREE.BoxGeometry(BLOCK_SIZE - BLOCK_GAP, 1, BLOCK_SIZE - BLOCK_GAP);
            const iMesh = new THREE.InstancedMesh(tempGeo, baseMat, maxBC);
            const dm = new THREE.Object3D(), col = new THREE.Color();
            let idx = 0; const bd = [];
            for (let xi = 0; xi < colsX; xi++) {
                const bcx = -halfWidth + xi * BLOCK_SIZE + BLOCK_SIZE / 2;
                let isLC = false;
                for (const lx of LANE_X_POSITIONS) { if (Math.abs(bcx - lx) <= BLOCK_SIZE / 2) { isLC = true; break; } }
                for (let zi = 0; zi < colsZ; zi++) {
                    const z = -halfLen + zi * BLOCK_SIZE + BLOCK_SIZE / 2;
                    let fh, pb = true;
                    if (isLC) fh = BLOCK_HEIGHT_MAX;
                    else { if (Math.random() > 0.35) pb = false; else fh = BLOCK_HEIGHT_MIN + Math.random() * (BLOCK_HEIGHT_MAX - BLOCK_HEIGHT_MIN) * 0.6; }
                    if (pb) {
                        bd.push({ x: bcx, y: -fh / 2, z, h: fh, idx });
                        dm.position.set(bcx, -fh / 2 + (animateIn ? -6 : 0), z);
                        dm.scale.set(1, fh, 1); dm.updateMatrix();
                        iMesh.setMatrixAt(idx, dm.matrix);
                        col.setHex(BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)]);
                        col.r += (Math.random() - 0.5) * 0.04; col.g += (Math.random() - 0.5) * 0.04; col.b += (Math.random() - 0.5) * 0.04;
                        iMesh.setColorAt(idx, col); idx++;
                    }
                }
            }
            iMesh.count = idx; iMesh.instanceMatrix.needsUpdate = true;
            if (iMesh.instanceColor) iMesh.instanceColor.needsUpdate = true;
            group.add(iMesh); scene.add(group); group._iMesh = iMesh;

            if (animateIn && bd.length > 0) {
                group._animateIn = function () {
                    const _now = performance.now();
                    if (_now - lastObstacleTime >= OBSTACLE_INTERVAL) { spawnObstacle(); lastObstacleTime = _now; }
                    if (Math.random() < 0.4) spawnDecoration();
                    const attn = Math.min(100, Math.max(0, attention_value));
                    const coinInterval = attn < 20 ? 4000 : attn < 50 ? 2500 : attn < 80 ? 1500 : 800;
                    if (_now - lastCoinTime >= coinInterval) { spawnCoinGroup(); lastCoinTime = _now; }
                    const d2 = new THREE.Object3D();
                    const animObj = { progress: 0 };
                    gsap.to(animObj, {
                        progress: 1, duration: 1.2, ease: "power2.out",
                        onUpdate: () => {
                            bd.forEach(data => {
                                const zR = (data.z + halfLen) / segmentLength;
                                const dl = (1 - zR) * 0.5;
                                let lP = Math.max(0, Math.min(1, (animObj.progress - dl) / (1 - dl)));
                                const eP = 1 - Math.pow(1 - lP, 3);
                                const yO = -6 * (1 - eP) + 3 * Math.sin(eP * Math.PI);
                                d2.position.set(data.x, data.y + yO, data.z);
                                d2.scale.set(1, data.h, 1); d2.updateMatrix();
                                iMesh.setMatrixAt(data.idx, d2.matrix);
                            });
                            iMesh.instanceMatrix.needsUpdate = true;
                        }
                    });
                };
            }
            return group;
        }

        function createLaneSegment(laneX, centerZ) {
            const pts = [new THREE.Vector3(0, 0.08, -segmentLength / 2), new THREE.Vector3(0, 0.08, segmentLength / 2)];
            const g = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.12 }));
            line.position.set(laneX, 0, centerZ); scene.add(line); return line;
        }

        function disposeMesh(mesh) {
            try {
                if (mesh.isGroup || (mesh.children && mesh.children.length > 0))
                    mesh.children.forEach(c => { if (c.geometry) c.geometry.dispose(); if (c.material) { if (Array.isArray(c.material)) c.material.forEach(m => m.dispose()); else c.material.dispose(); } });
                if (mesh.geometry) mesh.geometry.dispose();
                if (mesh.material) { if (Array.isArray(mesh.material)) mesh.material.forEach(m => m.dispose()); else mesh.material.dispose(); }
            } catch (e) { }
        }

        function updateInfiniteGroundAndLanes() {
            const cZ = camera.position.z, minZ = cZ - aheadRange, maxZ = cZ + behindRange;
            for (let i = groundSegments.length - 1; i >= 0; i--) {
                if (groundSegments[i].position.z > maxZ + segmentLength) { scene.remove(groundSegments[i]); disposeMesh(groundSegments[i]); groundSegments.splice(i, 1); }
            }
            Object.keys(laneSegments).forEach(k => {
                for (let i = laneSegments[k].length - 1; i >= 0; i--) {
                    const s = laneSegments[k][i];
                    if (s.position.z > maxZ + segmentLength || s.position.z < minZ - segmentLength) { scene.remove(s); disposeMesh(s); laneSegments[k].splice(i, 1); }
                }
            });
            let cMin = Infinity, cMax = -Infinity;
            if (groundSegments.length) groundSegments.forEach(s => { cMin = Math.min(cMin, s.position.z); cMax = Math.max(cMax, s.position.z); });
            if (!isFinite(cMin)) { cMin = Math.floor(minZ / segmentLength) * segmentLength; cMax = Math.floor(maxZ / segmentLength) * segmentLength; }
            for (let z = cMin - segmentLength; z >= minZ; z -= segmentLength) {
                const g = createGroundSegment(z, true); groundSegments.push(g);
                if (g._animateIn) g._animateIn();
                ['-4', '0', '4'].forEach(k => { laneSegments[k].push(createLaneSegment(parseInt(k), z)); });
            }
            for (let z = cMax + segmentLength; z <= maxZ; z += segmentLength) {
                const g = createGroundSegment(z, true); groundSegments.push(g);
                if (g._animateIn) g._animateIn();
                ['-4', '0', '4'].forEach(k => { laneSegments[k].push(createLaneSegment(parseInt(k), z)); });
            }
        }

        // ==================== WebSocket ====================
        function initWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                ws.onopen = () => { wsConnected = true; updateSimToggle(); };
                ws.onmessage = function (e) {
                    try {
                        const d = JSON.parse(e.data);
                        updateAlgorithmData(d.gyroscope_x, d.gyroscope_y, d.gyroscope_z, d.attention, d.focus_area_width, d.focus_area_height, d.focus_area_x, d.focus_area_y, d.focus_x, d.focus_y);
                    } catch (err) { }
                };
                ws.onerror = () => { };
                ws.onclose = () => { wsConnected = false; updateSimToggle(); setTimeout(initWebSocket, 5000); };
            } catch (e) { }
        }

        function updateSimToggle() {
            const btn = document.getElementById('sim-toggle');
            if (!btn) return;
            if (wsConnected) { btn.textContent = '✓'; btn.style.background = 'rgba(100,220,150,0.2)'; btn.style.color = 'rgba(100,220,150,0.8)'; }
            else { btn.textContent = '⚡'; btn.style.background = 'rgba(200,160,255,0.15)'; btn.style.color = 'rgba(255,255,255,0.6)'; }
        }

        // ==================== 主循环 ====================
        let lastFrameTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
            lastFrameTime = now;

            if (hitCooldown > 0) hitCooldown--;
            if (isPaused || !gameStarted) { composer.render(); return; }

            const att = Math.min(100, Math.max(0, focusValue));
            const targetSpeed = 0.05 + 0.001 * Math.pow(att, 1.2);
            smoothSpeed += (targetSpeed - smoothSpeed) * SPEED_LERP_FACTOR;
            const currentSpeed = Math.max(MIN_SPEED, smoothSpeed);
            playerGroup.position.z -= currentSpeed;

            updatePlayerPositionFromGyro();
            playerGroup.position.x += (currentLane * BLOCK_SIZE - playerGroup.position.x) * 0.12;

            if (!isJumping) {
                player.rotation.z = Math.sin(now * 0.008) * 0.08;
                player.position.y = 1 + Math.abs(Math.sin(now * 0.01)) * 0.05;
            }
            player.position.y += Math.sin(now * 0.003) * 0.003;

            afterimageTimer += dt;
            if (afterimageTimer > 0.03) {
                afterimageTimer = 0;
                for (let i = AFTERIMAGE_COUNT - 1; i > 0; i--) {
                    afterimages[i].position.copy(afterimages[i - 1].position);
                    afterimages[i].rotation.copy(afterimages[i - 1].rotation);
                    afterimages[i].material.opacity = afterimages[i - 1].material.opacity * 0.7;
                }
                afterimages[0].position.copy(player.position);
                afterimages[0].rotation.copy(player.rotation);
                afterimages[0].material.opacity = 0.15;
            }

            if (playerGroup._glow) {
                const gs2 = isJumping ? 1.5 : 1;
                playerGroup._glow.scale.lerp(new THREE.Vector3(gs2, gs2, 1), 0.1);
                playerGroup._glow.material.opacity = isJumping ? 0.35 : 0.2;
            }

            // 障碍物碰撞
            obstacles.forEach(obs => {
                const dz = obs.position.z - playerGroup.position.z;
                const dx = obs.position.x - playerGroup.position.x;
                if (Math.abs(dz) < 1.0 && Math.abs(dx) < (BLOCK_SIZE * 0.3)) {
                    if (isJumping) obs._jumped = true;
                    else if (hitCooldown <= 0 && !isFlashing && !obs._scored) { obs._scored = true; onPlayerHit(); }
                }
                if (!obs._scored && dz > 1) {
                    if (obs._jumped) { obs._scored = true; score = Math.max(0, score + 2); showScoreChange(2); }
                    else obs._scored = true;
                }
            });

            // 金币碰撞
            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                if (c._collected) continue;
                const dz = c.position.z - playerGroup.position.z;
                const dx = c.position.x - playerGroup.position.x;
                const dy = c.position.y - (player.position.y + playerGroup.position.y);
                if (Math.abs(dz) < 1.2 && Math.abs(dx) < 1.5 && Math.abs(dy) < 1.5) {
                    collectCoinAnim(c);
                }
            }

            // 障碍物动画
            obstacles.forEach(obs => {
                if (obs._spin) { obs.rotation.y += dt * 1.5; obs.rotation.x += dt * 0.5; }
                if (obs._float) obs.position.y += Math.sin(now * 0.002 + obs.position.z) * 0.003;
            });

            // 金币旋转浮动
            coins.forEach(c => {
                if (c._collected) return;
                c.rotation.z += dt * 3;
                c.position.y += Math.sin(now * 0.003 + c.position.z * 0.5) * 0.004;
            });

            decorations.forEach(d => {
                if (d._spin) d.rotation.y += dt * 0.8;
                if (d._float) d.position.y += Math.sin(now * 0.001 + d.position.z * 0.1) * 0.005;
            });

            // 清理
            for (let i = obstacles.length - 1; i >= 0; i--) {
                if (obstacles[i].position.z > playerGroup.position.z + 20) { scene.remove(obstacles[i]); disposeMesh(obstacles[i]); obstacles.splice(i, 1); }
            }
            for (let i = coins.length - 1; i >= 0; i--) {
                if (coins[i].position.z > playerGroup.position.z + 20 && !coins[i]._collected) { scene.remove(coins[i]); coins.splice(i, 1); }
            }
            for (let i = decorations.length - 1; i >= 0; i--) {
                if (decorations[i].position.z > playerGroup.position.z + 20) { scene.remove(decorations[i]); disposeMesh(decorations[i]); decorations.splice(i, 1); }
            }

            camera.position.lerp(new THREE.Vector3(playerGroup.position.x, 5, playerGroup.position.z + 10), 0.12);
            camera.lookAt(playerGroup.position.x, 0, playerGroup.position.z - 5);
            if (skyMesh) { skyMesh.position.copy(camera.position); skyMesh.material.uniforms.time.value = now * 0.001; }

            updateInfiniteGroundAndLanes();
            updateJumpParticles(dt);
            updateDustParticles(dt);

            if (now - lastAttnTick >= attnTickInterval) { lastAttnTick = now; applyAttnEffects(); }

            // UI
            document.getElementById('score-val').innerText = score;
            document.getElementById('coin-val').innerText = coinCount;
            document.getElementById('attn-top').innerText = Math.round(attention_value);
            document.getElementById('attn-bar').style.width = Math.min(100, Math.max(0, attention_value)) + '%';

            const bc = document.querySelector('.energy-bar-container');
            if (bc) {
                if (attention_value > 70) bc.style.boxShadow = '0 0 25px rgba(0,255,136,0.6)';
                else if (attention_value > 30) bc.style.boxShadow = '0 0 15px rgba(255,217,61,0.4)';
                else bc.style.boxShadow = '0 0 10px rgba(255,50,50,0.3)';
            }

            document.getElementById('gyro-x').innerText = gyroscope_x.toFixed(2);
            document.getElementById('gyro-y').innerText = gyroscope_y.toFixed(2);
            document.getElementById('gyro-z').innerText = gyroscope_z.toFixed(2);
            document.getElementById('attn-val').innerText = attention_value.toFixed(2);
            document.getElementById('cursor-x').innerText = filtered_focus_x.toFixed(0);
            document.getElementById('cursor-y').innerText = filtered_focus_y.toFixed(0);

            if (simMode !== 'off') updateSimAttn(now);

            composer.render();
        }

        // ==================== 模拟注意力 ====================
        function updateSimAttn(now) {
            if (now - simLastTick >= SIM_TICK_INTERVAL) {
                simLastTick = now;
                let lo, hi;
                if (simMode === 'low') { lo = 0; hi = 29; }
                else if (simMode === 'high') { lo = 31; hi = 100; }
                else { lo = 0; hi = 100; }
                simAttnTarget = Math.max(lo, Math.min(hi, simAttnTarget + (Math.random() - 0.5) * (hi - lo) * 0.4));
            }
            simAttnValue += (simAttnTarget - simAttnValue) * SIM_LERP_SPEED;
            simAttnValue = Math.max(0, Math.min(100, simAttnValue));
            attention_value = simAttnValue; focusValue = simAttnValue;
            const d = document.getElementById('sim-val-display');
            if (d && simMode !== 'off') d.textContent = simAttnValue.toFixed(0);
        }

        // ==================== 陀螺仪 ====================
        let laneChangeCooldown = 0;
        const LANE_CHANGE_COOLDOWN_FRAMES = 45;
        const GYRO_Y_JUMP_THRESHOLD = 260;
        const GYRO_Z_LEFT_THRESHOLD = 180;
        const GYRO_Z_RIGHT_THRESHOLD = 160;
        let last_gyro_y_for_jump = 270, last_gyro_z_for_lane = 170;

        function updatePlayerPositionFromGyro() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            if (laneChangeCooldown > 0) laneChangeCooldown--;
            if (gyroscope_y < GYRO_Y_JUMP_THRESHOLD && last_gyro_y_for_jump >= GYRO_Y_JUMP_THRESHOLD) {
                if (player.position.y <= 1.3 && !isJumping) triggerJump();
            }
            if (laneChangeCooldown === 0) {
                if (gyroscope_z > GYRO_Z_LEFT_THRESHOLD && last_gyro_z_for_lane <= GYRO_Z_LEFT_THRESHOLD) {
                    if (currentLane > -1) { currentLane--; laneChangeCooldown = LANE_CHANGE_COOLDOWN_FRAMES; }
                } else if (gyroscope_z < GYRO_Z_RIGHT_THRESHOLD && last_gyro_z_for_lane >= GYRO_Z_RIGHT_THRESHOLD) {
                    if (currentLane < 1) { currentLane++; laneChangeCooldown = LANE_CHANGE_COOLDOWN_FRAMES; }
                }
            }
            last_gyro_y_for_jump = gyroscope_y; last_gyro_z_for_lane = gyroscope_z;
        }

        // ==================== 跳跃 ====================
        function triggerJump() {
            if (isJumping) return;
            isJumping = true;
            emitJumpParticles();
            const tl = gsap.timeline({ onComplete: () => { isJumping = false; } });
            tl.to(player.position, { y: 3.5, duration: 0.3, ease: "power2.out" }, 0);
            tl.to(player.rotation, { x: -0.3, duration: 0.15, ease: "power2.out", onComplete: () => { gsap.to(player.rotation, { x: 0.2, duration: 0.15, ease: "power2.inOut" }); } }, 0);
            tl.to(player.position, { y: 3.5, duration: 0.1 }, 0.3);
            tl.to(player.position, { y: 1, duration: 0.25, ease: "power2.in" }, 0.4);
            tl.to(player.rotation, { x: 0, duration: 0.15, ease: "power2.out" }, 0.6);
            tl.to(player.scale, { x: 1.3, y: 0.7, z: 1.3, duration: 0.08, ease: "power2.out" }, 0.6);
            tl.to(player.scale, { x: 1, y: 1, z: 1, duration: 0.2, ease: "elastic.out(1, 0.4)" }, 0.68);
            tl.call(() => { emitLandingParticles(); }, null, 0.6);
        }

        // ==================== 键盘 ====================
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
            if (!gameStarted) return;
            if (isPaused && e.key !== 'p' && e.key !== 'P') return;
            switch (e.key) {
                case 'ArrowLeft': case 'a': case 'A': if (currentLane > -1) currentLane--; break;
                case 'ArrowRight': case 'd': case 'D': if (currentLane < 1) currentLane++; break;
                case ' ': if (player.position.y <= 1.3 && !isJumping) triggerJump(); break;
                case 'p': case 'P': togglePause(); break;
            }
        });

        // ==================== 碰撞 ====================
        function onPlayerHit() {
            hitCooldown = 60;
            score = Math.max(0, score - 5);
            showScoreChange(-5);
            flashPlayer();
            showReminder();
        }

        function flashPlayer() {
            isFlashing = true;
            const oei = player.material.emissiveIntensity, oc = player.material.color.getHex(), oe = player.material.emissive.getHex();
            const tl = gsap.timeline({ onComplete: () => { isFlashing = false; } });
            tl.to(player.material, { emissiveIntensity: 2.0, duration: 0.08, onStart: () => { player.material.color.set(0xff4444); player.material.emissive.set(0xff0000); } })
                .to(player.material, { emissiveIntensity: oei, duration: 0.08, onComplete: () => { player.material.color.setHex(oc); player.material.emissive.setHex(oe); } })
                .to({}, { duration: 0.06 })
                .to(player.material, { emissiveIntensity: 2.0, duration: 0.08, onStart: () => { player.material.color.set(0xff4444); player.material.emissive.set(0xff0000); } })
                .to(player.material, { emissiveIntensity: oei, duration: 0.08, onComplete: () => { player.material.color.setHex(oc); player.material.emissive.setHex(oe); } });
            gsap.to(playerGroup.position, { x: playerGroup.position.x + 0.3, duration: 0.05, yoyo: true, repeat: 3, ease: "power2.inOut" });
        }

        function showReminder() {
            const msgs = ['集中注意力哦～', '别走神，继续跑～', '专注，你可以的～', '保持专注，冲呀～', '注意力集中起来～', '加油，别被干扰～', '盯紧前方哦～', '稳住，集中精神～'];
            const el = document.getElementById('reminder');
            gsap.killTweensOf(el);
            el.textContent = msgs[Math.floor(Math.random() * msgs.length)];
            el.classList.remove('show'); el.classList.add('show');
            gsap.fromTo(el, { opacity: 0, scale: 0.85, xPercent: -50, yPercent: -50, filter: 'blur(4px)' }, { opacity: 1, scale: 1.05, xPercent: -50, yPercent: -50, filter: 'blur(0px)', duration: 0.3, ease: 'power2.out' });
            gsap.to(el, { scale: 1.0, xPercent: -50, yPercent: -50, duration: 0.2, delay: 0.3 });
            gsap.to(el, { opacity: 0, scale: 1.02, xPercent: -50, yPercent: -72, filter: 'blur(3px)', duration: 1.8, delay: 0.6, ease: 'power2.out', onComplete: () => { el.classList.remove('show'); } });
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-overlay').classList.toggle('active', isPaused);
        }

        // ==================== 算法数据 ====================
        function updateAlgorithmData(gyroX, gyroY, gyroZ, attention, fw, fh, fax, fay, fx, fy) {
            gyroscope_x = gyroX || 0; gyroscope_y = gyroY || 0; gyroscope_z = gyroZ || 0;
            let ar = (attention !== undefined && attention !== null) ? attention : 0;
            attention_value = ar > 1 ? ar : ar * 100;
            focus_area_width = fw || 0; focus_area_height = fh || 0;
            focus_area_x = fax || 0; focus_area_y = fay || 0;
            focus_x = fx || 0; focus_y = fy || 0;
            filtered_focus_x = FOCUS_EMA_ALPHA_X * focus_x + (1 - FOCUS_EMA_ALPHA_X) * filtered_focus_x;
            filtered_focus_y = FOCUS_EMA_ALPHA_Y * focus_y + (1 - FOCUS_EMA_ALPHA_Y) * filtered_focus_y;
            focusValue = Math.min(100, Math.max(0, attention_value));
        }

        // ==================== 积分蒙太奇 ====================
        let _montageEl = null, _montageHideTimer = null, _lastScoreKey = null, _lastScoreCount = 0;

        function ensureMontageEl() {
            if (_montageEl && document.body.contains(_montageEl)) return _montageEl;
            _montageEl = document.createElement('div'); _montageEl.className = 'score-montage';
            document.body.appendChild(_montageEl); return _montageEl;
        }

        function showScoreChange(amount) {
            if (!amount) return;
            const key = (amount > 0 ? '+' : '') + amount;
            const el = ensureMontageEl();
            if (key === _lastScoreKey) _lastScoreCount++; else { _lastScoreKey = key; _lastScoreCount = 1; }
            el.classList.remove('pos', 'neg'); el.classList.add(amount > 0 ? 'pos' : 'neg');
            el.textContent = key + (_lastScoreCount > 1 ? ' x' + _lastScoreCount : '');
            el.style.left = '50%'; el.style.top = '32%'; el._centered = true;
            gsap.killTweensOf(el); el.classList.add('show');
            gsap.fromTo(el, { opacity: 0, y: 6, xPercent: -50, yPercent: -50 }, { opacity: 1, y: 0, xPercent: -50, yPercent: -50, duration: 0.25, ease: 'power2.out' });
            gsap.to(el, { opacity: 0, y: -34, xPercent: -50, yPercent: -50, duration: 1.1, delay: 0.2, ease: 'power2.out', onComplete: () => { el.classList.remove('show'); _lastScoreKey = null; _lastScoreCount = 0; } });
            if (_montageHideTimer) clearTimeout(_montageHideTimer);
            _montageHideTimer = setTimeout(() => { el.classList.remove('show'); _lastScoreKey = null; _lastScoreCount = 0; }, 1500);
        }

        // ==================== 场景视觉 ====================
        function updateSceneVisuals(att) {
            const t = (att <= 30) ? (0.7 + att * 0.01) : (att / 100);
            if (skyMesh) {
                const u = skyMesh.material.uniforms;
                u.topColor.value.setHSL(0.75, THREE.MathUtils.lerp(0.2, 0.6, t), THREE.MathUtils.lerp(0.05, 0.25, t));
                u.midColor.value.setHSL(0.78, THREE.MathUtils.lerp(0.2, 0.5, t), THREE.MathUtils.lerp(0.3, 0.7, t));
                u.bottomColor.value.setHSL(THREE.MathUtils.lerp(0.0, 0.95, t), THREE.MathUtils.lerp(0.2, 0.4, t), THREE.MathUtils.lerp(0.3, 0.8, t));
                u.sunY.value = THREE.MathUtils.lerp(0.05, 0.25, t);
                u.sunColor.value.setHSL(THREE.MathUtils.lerp(0.05, 0.12, t), THREE.MathUtils.lerp(0.5, 0.8, t), THREE.MathUtils.lerp(0.3, 0.7, t));
            }
            scene.fog.color.setHSL(0.78, THREE.MathUtils.lerp(0.1, 0.4, t), THREE.MathUtils.lerp(0.3, 0.7, t));
            scene.fog.near = THREE.MathUtils.lerp(5, 20, t); scene.fog.far = THREE.MathUtils.lerp(30, 80, t);
            if (composer.passes[1]) composer.passes[1].strength = THREE.MathUtils.lerp(0.15, 0.7, t);
            if (composer.passes[2]) { composer.passes[2].uniforms["darkness"].value = THREE.MathUtils.lerp(2.5, 0.8, t); composer.passes[2].uniforms["offset"].value = THREE.MathUtils.lerp(0.6, 1.2, t); }
        }

        function applyAttnEffects() {
            const att = Math.min(100, Math.max(0, attention_value));
            if (att < 10) { if (score > 0) { score = Math.max(0, score - 1); showScoreChange(-1); } }
            else if (att <= 30) { score = Math.max(0, score + 1); showScoreChange(1); }
            else { score = Math.max(0, score + 5); showScoreChange(5); }
            updateSceneVisuals(att);

            // 注意力>30时也检查觉醒
            if (att > 30 && !isAwakened) {
                checkAwakening();
            }
        }

        // ==================== 窗口适配 ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
