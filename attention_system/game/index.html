<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>梦核跑酷 - 稳定渲染版</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
            z-index: 100; pointer-events: none; text-align: center;
        }
        .energy-bar-container {
            width: 300px; height: 20px; background: rgba(255,255,255,0.15);
            margin-top: 15px; border-radius: 10px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(0,242,255,0.3);
            transition: box-shadow 0.5s ease;
        }
        #attn-bar {
            width: 30%; height: 100%;
            background: linear-gradient(90deg, #ff6b6b 0%, #ffd93d 50%, #6bcf7f 100%);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(0,255,136,0.25);
        }
        .controls { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; }
        /* 隐蔽的算法数据显示 */
        #algorithm-data {
            position: absolute; top: 20px; right: 20px; 
            color: rgba(255, 255, 255, 0.3); font-size: 10px;
            text-align: right; z-index: 100; pointer-events: none;
            font-family: monospace;
        }
        #algorithm-data div {
            margin-bottom: 2px;
        }
        /* 专注提醒文字 */
        #reminder {
            position: absolute; top: 32%; left: 50%;
            color: rgba(245, 225, 255, 0.95); font-size: 24px; font-weight: 500;
            text-shadow:
                0 0 12px rgba(200, 160, 220, 0.4),
                0 0 30px rgba(180, 140, 210, 0.25),
                0 0 60px rgba(160, 120, 200, 0.15);
            z-index: 200; pointer-events: none;
            opacity: 0;
            letter-spacing: 3px;
            white-space: nowrap;
            padding: 6px 20px;
            border-radius: 24px;
            background: radial-gradient(ellipse at center, rgba(180,140,210,0.12) 0%, transparent 70%);
        }
        #reminder.show {
            opacity: 1;
        }
        /* 积分变动蒙太奇（精简样式：纯色文字，无背景） */
        .score-montage {
            --montage-font-size: 26px;
            position: absolute;
            top: 32%; /* 初始参考与提醒信息同一高度（会被 JS 精准定位） */
            left: 50%;
            font-size: var(--montage-font-size);
            font-weight: 600;
            line-height: 1;
            padding: 0 6px;
            pointer-events: none;
            opacity: 0;
            z-index: 300;
            text-align: center;
            letter-spacing: 1px;
            background: transparent;
        }
        .score-montage.show {
            opacity: 1;
        }
        .score-montage.pos {
            color: rgba(180, 220, 180, 0.92);
            text-shadow: 0 0 10px rgba(150, 210, 160, 0.35), 0 0 24px rgba(140, 200, 150, 0.2);
        }
        .score-montage.neg {
            color: rgba(230, 170, 175, 0.92);
            text-shadow: 0 0 10px rgba(210, 150, 160, 0.35), 0 0 24px rgba(200, 140, 150, 0.2);
        }
        /* 模拟测试面板 */
        #sim-panel {
            position: absolute; bottom: 16px; left: 16px;
            z-index: 400; display: flex; flex-direction: column; gap: 6px;
            opacity: 0.35; transition: opacity 0.3s ease;
            font-family: monospace; font-size: 11px;
        }
        #sim-panel:hover { opacity: 0.95; }
        #sim-panel .sim-row { display: flex; gap: 4px; align-items: center; }
        #sim-panel button {
            padding: 3px 10px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.45); color: rgba(255,255,255,0.7);
            border-radius: 4px; cursor: pointer; font-size: 11px;
            font-family: monospace; transition: all 0.2s ease;
        }
        #sim-panel button:hover { background: rgba(255,255,255,0.12); color: #fff; }
        #sim-panel button.active {
            background: rgba(100,200,255,0.25); border-color: rgba(100,200,255,0.5);
            color: #fff;
        }
        #sim-panel .sim-label { color: rgba(255,255,255,0.5); font-size: 10px; min-width: 60px; }
        #sim-panel .sim-val { color: rgba(100,220,255,0.8); font-size: 11px; min-width: 32px; text-align: right; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 16px; letter-spacing: 3px; font-weight: bold;">DREAMCORE RUNNER</div>
        <div style="font-size: 32px; margin-top: 8px; font-weight: bold;">Score: <span id="score-val">0</span></div>
        <div class="energy-bar-container"><div id="attn-bar"></div></div>
        <div style="margin-top: 8px; font-size: 14px; opacity: 0.9;">⚡ Attn: <span id="attn-top">0</span>%</div>
    </div>
    <!-- 隐蔽的算法数据显示 -->
    <div id="algorithm-data">
        <div>GyroX: <span id="gyro-x">0.00</span></div>
        <div>GyroY: <span id="gyro-y">0.00</span></div>
        <div>GyroZ: <span id="gyro-z">0.00</span></div>
        <div>Attn: <span id="attn-val">0.00</span></div>
        <div>CursorX: <span id="cursor-x">0</span></div>
        <div>CursorY: <span id="cursor-y">0</span></div>
    </div>
    <div id="reminder"></div>
    <!-- 模拟测试面板 -->
    <div id="sim-panel">
        <div class="sim-row">
            <span class="sim-label">SIM ATTN</span>
            <span class="sim-val" id="sim-val-display">OFF</span>
        </div>
        <div class="sim-row">
            <button id="sim-btn-off" class="active" onclick="setSimMode('off')">OFF</button>
            <button id="sim-btn-low" onclick="setSimMode('low')">LOW</button>
            <button id="sim-btn-high" onclick="setSimMode('high')">HIGH</button>
            <button id="sim-btn-auto" onclick="setSimMode('auto')">AUTO</button>
        </div>
    </div>
    <div class="controls">← → / A D - 左右移动 | Space - 跳跃 | P - 暂停/继续</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/shaders/VignetteShader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

    <script>
        // 核心变量
        let scene, camera, renderer, composer, player;
        let score = 0, focusValue = 30; 
        let currentLane = 0; 
        let obstacles = [];
        let hitCooldown = 0;  // 碰撞冷却帧数，防止连续触发
        let isFlashing = false;  // 角色是否正在闪烁
        // 积分/速度控制相关
        let lastAttnTick = performance.now();
        const attnTickInterval = 1000; // 毫秒：每秒根据 attention 更新积分和速度
        let speedMultiplier = 1.0; // 根据 attention 调整移动速度
        // 障碍物生成时序控制
        let lastObstacleTime = 0;
        const OBSTACLE_INTERVAL = 1500;

        // 算法数据变量
        let gyroscope_x = 0;
        let gyroscope_y = 0;
        let gyroscope_z = 0;
        let attention_value = 0;
        let focus_area_width = 0;
        let focus_area_height = 0;
        let focus_area_x = 0;
        let focus_area_y = 0;
        let focus_x = 0;
        let focus_y = 0;
        
        // 滤波后的焦点坐标（用于实际控制）
        let filtered_focus_x = 0;
        let filtered_focus_y = 0;
        // EMA 滤波系数：0~1，越小越平滑（灵敏度越低）
        const FOCUS_EMA_ALPHA_X = 0.3;  // X方向（左右）更平滑
        const FOCUS_EMA_ALPHA_Y = 0.6;  // Y方向（跳跃）响应更快
        
        // 上一帧的陀螺仪数据，用于计算变化量
        let last_gyroscope_x = 0;
        let last_gyroscope_y = 0;
        
        // 上一帧的光标数据，用于计算相对位移
        let last_cursor_x = 0;
        let last_cursor_y = 0;
        
        // 游戏状态
        let isPaused = false;
        
        // 模拟注意力系统
        let simMode = 'off';       // 'off' | 'low' | 'high' | 'auto'
        let simAttnValue = 30;     // 当前模拟值
        let simAttnTarget = 30;    // 目标值（缓慢趋近）
        let simLastTick = 0;       // 上次更新目标的时间
        const SIM_TICK_INTERVAL = 800;  // 每 800ms 更换一次目标
        const SIM_LERP_SPEED = 0.04;    // 每帧趋近目标的速率（越小越慢越平滑）
        
        // WebSocket连接
        let ws = null;
        const WS_URL = 'ws://localhost:8765';

        // 天空球引用（用于动态更新）
        let skyMesh = null;

        function init() {
            // 场景初始化
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xd8b5ff, 6, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 创建天空球
            createSky();

            // 角色与环境
            player = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 0.8, 4, 16),
                new THREE.MeshLambertMaterial({ color: 0x87ceeb, emissive: 0x87ceeb, emissiveIntensity: 0.2 })
            );
            player.position.set(0, 1, 0);
            scene.add(player);

            // 使用可扩展的地面与轨道段（实现无限延伸，随相机生成/销毁）
            initInfiniteGroundAndLanes();

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            // 添加平行光增强方块地面的立体感
            const dirLight = new THREE.DirectionalLight(0xffeedd, 0.5);
            dirLight.position.set(5, 15, 10);
            scene.add(dirLight);

            // 后期处理初始化 (关键修复点：使用全局 THREE 访问) [cite: 13, 39]
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));

            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.4, 0.95);
            composer.addPass(bloomPass);

            const vignettePass = new THREE.ShaderPass(THREE.VignetteShader);
            vignettePass.uniforms["offset"].value = 1.0;
            vignettePass.uniforms["darkness"].value = 1.8;
            composer.addPass(vignettePass);


            
            // 初始化WebSocket连接
            initWebSocket();
            
            animate();
        }
        
        function initWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        updateAlgorithmData(
                            data.gyroscope_x, 
                            data.gyroscope_y, 
                            data.gyroscope_z,
                            data.attention, 
                            data.focus_area_width, 
                            data.focus_area_height,
                            data.focus_area_x,
                            data.focus_area_y,
                            data.focus_x,
                            data.focus_y
                        );
                    } catch (e) {
                        console.error('[WebSocket] 数据解析错误:', e);
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('[WebSocket] 错误:', error);
                };
                
                ws.onclose = function() {
                    setTimeout(initWebSocket, 5000);
                };
            } catch (e) { /* ignore */ }
        }

        // ---------- 天空球系统 ----------
        function createSky() {
            const skyGeo = new THREE.SphereGeometry(400, 32, 32);
            const skyMat = new THREE.ShaderMaterial({
                uniforms: {
                    topColor:    { value: new THREE.Color(0x1a0533) },
                    midColor:    { value: new THREE.Color(0xd8b5ff) },
                    bottomColor: { value: new THREE.Color(0xffd1dc) },
                    sunColor:    { value: new THREE.Color(0xffaa66) },
                    sunY:        { value: 0.15 },
                    offset:      { value: 20 },
                    exponent:    { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPos.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 midColor;
                    uniform vec3 bottomColor;
                    uniform vec3 sunColor;
                    uniform float sunY;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition + offset).y;
                        float tBottom = pow(max(h, 0.0), 0.4);
                        vec3 col = mix(bottomColor, midColor, clamp(tBottom * 2.0, 0.0, 1.0));
                        float tTop = pow(max(h - 0.3, 0.0), exponent);
                        col = mix(col, topColor, clamp(tTop, 0.0, 1.0));
                        float sunDist = abs(h - sunY);
                        float sunGlow = exp(-sunDist * 8.0) * 0.6;
                        col += sunColor * sunGlow;
                        gl_FragColor = vec4(col, 1.0);
                    }
                `,
                side: THREE.BackSide,
                depthWrite: false
            });
            skyMesh = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skyMesh);
        }

        function spawnObstacle() {
            // 生成 -1/0/1 三个索引对应三条轨道；与 LANE_X_POSITIONS 对应的实际 X 为 index * BLOCK_SIZE
            const lane = Math.floor(Math.random() * 3) - 1;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshLambertMaterial({ color: 0xffb6c1 }));
            // 初始位置在下方，与地板一起从下方浮上来
            obs.position.set(lane * 4, -5.4, player.position.z - 60);
            scene.add(obs);
            // 标记用于得分/碰撞判断
            obs._scored = false;
            obs._jumped = false;
            obstacles.push(obs);
            // 从下方升起到目标位置（与地板水波浪动画节奏一致）
            gsap.to(obs.position, {
                y: 0.6,
                duration: 1.2,
                ease: "power2.out"
            });
        }

        // ---------- 无限地面与轨道系统 ----------
        const groundSegments = [];
        // laneSegments 的 key 使用实际 X 值字符串以便清理时对应
        const laneSegments = { '-4': [], '0': [], '4': [] };
        const segmentLength = 40; // 每段长度（z方向）
        const aheadRange = 60; // 相机向前需要的范围（调近以优化近场动画效果）
        const behindRange = 40; // 相机向后的保留范围

        function initInfiniteGroundAndLanes() {
            // 初始化时填充足够的段以覆盖相机前后范围
            const cameraZ = (camera && camera.position) ? camera.position.z : player.position.z + 10;
            const minZ = cameraZ - aheadRange;
            const maxZ = cameraZ + behindRange;
            for (let z = Math.floor(minZ / segmentLength) * segmentLength; z <= maxZ; z += segmentLength) {
                const centerZ = z;
                const g = createGroundSegment(centerZ, false);
                groundSegments.push(g);
                ['-4','0','4'].forEach(k => {
                    const lane = createLaneSegment(parseInt(k), centerZ);
                    laneSegments[k].push(lane);
                });
            }
        }

        // 方块地面参数（等比例放大2倍）
        const BLOCK_SIZE = 4;
        const BLOCK_GAP = 0.3;
        const BLOCK_HEIGHT_MIN = 0.2;
        const BLOCK_HEIGHT_MAX = 1.0;
        const GROUND_WIDTH = 60;
        // 三条轨道的 X 坐标（这些列保留完整方块）
        // 将轨道位置与方块列中心对齐（BLOCK_SIZE 为 4），使用 -4,0,4 能让轨道与方块列中心精确对齐
        const LANE_X_POSITIONS = [-4, 0, 4];
        // 方块地面颜色调色板（梦核风格）
        const BLOCK_COLORS = [0xffd1dc, 0xf0b8c8, 0xe8a0b8, 0xffc4d6, 0xf5d0e0, 0xeecccc];

        function createGroundSegment(centerZ, animateIn = false) {
            // 使用 InstancedMesh 批量渲染方块地面
            const group = new THREE.Group();
            group.position.z = centerZ;

            const halfLen = segmentLength / 2;
            const halfWidth = GROUND_WIDTH / 2;
            const colsX = Math.ceil(GROUND_WIDTH / BLOCK_SIZE);
            const colsZ = Math.ceil(segmentLength / BLOCK_SIZE);
            // 最大方块数（实际可能更少，因为零散区域有空位）
            const maxBlockCount = colsX * colsZ;

            const baseMat = new THREE.MeshLambertMaterial({ color: 0xffd1dc });
            const tempGeo = new THREE.BoxGeometry(BLOCK_SIZE - BLOCK_GAP, 1, BLOCK_SIZE - BLOCK_GAP);
            const instancedMesh = new THREE.InstancedMesh(tempGeo, baseMat, maxBlockCount);

            const dummy = new THREE.Object3D();
            const color = new THREE.Color();
            let idx = 0;
            // 保存每个方块的初始数据用于水波浪动画
            const blockData = [];

            for (let xi = 0; xi < colsX; xi++) {
                const blockCenterX = -halfWidth + xi * BLOCK_SIZE + BLOCK_SIZE / 2;

                // 判断该列是否包含轨道（方块左边 <= 轨道中心 <= 方块右边）
                let isLaneColumn = false;
                for (const laneX of LANE_X_POSITIONS) {
                    if (Math.abs(blockCenterX - laneX) <= BLOCK_SIZE / 2) {
                        isLaneColumn = true;
                        break;
                    }
                }

                for (let zi = 0; zi < colsZ; zi++) {
                    const z = -halfLen + zi * BLOCK_SIZE + BLOCK_SIZE / 2;
                    let finalH;
                    let placeBlock = true;

                    if (isLaneColumn) {
                        // 轨道列：完整方块，固定高度
                        finalH = BLOCK_HEIGHT_MAX;
                    } else {
                        // 非轨道列：零散显示（约 35% 概率放置）
                        if (Math.random() > 0.35) {
                            placeBlock = false;
                        } else {
                            // 零散方块高度随机变化较大，有些很低形成错落感
                            finalH = BLOCK_HEIGHT_MIN + Math.random() * (BLOCK_HEIGHT_MAX - BLOCK_HEIGHT_MIN) * 0.6;
                        }
                    }

                    if (placeBlock) {
                        // 保存数据用于水波浪动画
                        blockData.push({
                            x: blockCenterX,
                            y: -finalH / 2,
                            z: z,
                            h: finalH,
                            idx: idx
                        });

                        const initialYOffset = animateIn ? -6 : 0;
                        dummy.position.set(blockCenterX, -finalH / 2 + initialYOffset, z);
                        dummy.scale.set(1, finalH, 1);
                        dummy.updateMatrix();
                        instancedMesh.setMatrixAt(idx, dummy.matrix);

                        // 调色板随机色差
                        const baseColor = BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)];
                        color.setHex(baseColor);
                        color.r += (Math.random() - 0.5) * 0.04;
                        color.g += (Math.random() - 0.5) * 0.04;
                        color.b += (Math.random() - 0.5) * 0.04;
                        instancedMesh.setColorAt(idx, color);

                        idx++;
                    }
                }
            }

            instancedMesh.count = idx;
            instancedMesh.instanceMatrix.needsUpdate = true;
            if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;

            group.add(instancedMesh);
            scene.add(group);
            group._instancedMesh = instancedMesh;

            // 水波浪入场动画
            if (animateIn && blockData.length > 0) {
                group._animateIn = function() {
                    // 与地板段同步生成障碍物（基于时间间隔控制密度）
                    const _now = performance.now();
                    if (_now - lastObstacleTime >= OBSTACLE_INTERVAL) {
                        const lane = Math.floor(Math.random() * 3) - 1;
                        const obs = new THREE.Mesh(
                            new THREE.BoxGeometry(1.2, 1.2, 1.2),
                            new THREE.MeshLambertMaterial({ color: 0xffb6c1 })
                        );
                        // z 在该段范围内随机偏移，避免都在同一位置
                        const zOffset = (Math.random() - 0.5) * (segmentLength - 8);
                        obs.position.set(lane * 4, -5.4, centerZ + zOffset);
                        scene.add(obs);
                        obs._scored = false;
                        obs._jumped = false;
                        obstacles.push(obs);
                        // 与地板同步从下方升起
                        gsap.to(obs.position, {
                            y: 0.6,
                            duration: 1.2,
                            ease: "power2.out"
                        });
                        lastObstacleTime = _now;
                    }

                    const dummy = new THREE.Object3D();
                    const startY = -6;
                    const riseHeight = 3;
                    const duration = 1.2;

                    const animObj = { progress: 0 };
                    gsap.to(animObj, {
                        progress: 1,
                        duration: duration,
                        ease: "power2.out",
                        onUpdate: () => {
                            const p = animObj.progress;
                            blockData.forEach(data => {
                                // 基于 z 位置的波浪延迟：近端（z 大）先开始，远端（z 小）后开始
                                const zRatio = (data.z + halfLen) / segmentLength;
                                const delay = (1 - zRatio) * 0.5;

                                let localP = (p - delay) / (1 - delay);
                                if (localP < 0) localP = 0;
                                if (localP > 1) localP = 1;

                                // ease-out cubic
                                const easeP = 1 - Math.pow(1 - localP, 3);

                                // 从底部缓缓升起，过冲，再落到目标位置
                                const yOffset = startY * (1 - easeP) + riseHeight * Math.sin(easeP * Math.PI);

                                dummy.position.set(data.x, data.y + yOffset, data.z);
                                dummy.scale.set(1, data.h, 1);
                                dummy.updateMatrix();
                                instancedMesh.setMatrixAt(data.idx, dummy.matrix);
                            });
                            instancedMesh.instanceMatrix.needsUpdate = true;
                        }
                    });
                };
            }

            return group;
        }

        function createLaneSegment(laneX, centerZ) {
            // 用线段表示轨道：几何在本地坐标系中以段中心为原点，使用 line.position 设置全局位置
            const half = segmentLength / 2;
            const pts = [
                new THREE.Vector3(0, 0.08, -half),
                new THREE.Vector3(0, 0.08, half)
            ];
            const g = new THREE.BufferGeometry().setFromPoints(pts);
            // 将轨道线做得更隐蔽、颜色更柔和一些
            const m = new THREE.LineBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.12 });
            const line = new THREE.Line(g, m);
            line.position.set(laneX, 0, centerZ);
            scene.add(line);
            return line;
        }

        function disposeMesh(mesh) {
            try {
                // 支持 Group（方块地面段）递归清理
                if (mesh.isGroup || (mesh.children && mesh.children.length > 0)) {
                    mesh.children.forEach(child => {
                        if (child.geometry) child.geometry.dispose();
                        if (child.material) {
                            if (Array.isArray(child.material)) child.material.forEach(mat => mat.dispose());
                            else child.material.dispose();
                        }
                    });
                }
                if (mesh.geometry) mesh.geometry.dispose();
                if (mesh.material) {
                    if (Array.isArray(mesh.material)) mesh.material.forEach(mat => mat.dispose());
                    else mesh.material.dispose();
                }
            } catch (e) { /* ignore */ }
        }

        function updateInfiniteGroundAndLanes() {
            const cameraZ = camera.position.z;
            const minZ = cameraZ - aheadRange;
            const maxZ = cameraZ + behindRange;

            // 移除在摄像机后方过远的地面段
            for (let i = groundSegments.length - 1; i >= 0; i--) {
                const seg = groundSegments[i];
                if (seg.position.z > maxZ + segmentLength) {
                    scene.remove(seg);
                    disposeMesh(seg);
                    groundSegments.splice(i, 1);
                }
            }

            // 移除轨道段
            Object.keys(laneSegments).forEach(k => {
                const arr = laneSegments[k];
                for (let i = arr.length - 1; i >= 0; i--) {
                    const seg = arr[i];
                    // seg.position.z 已设置为段中心的 z
                    if (seg.position.z > maxZ + segmentLength || seg.position.z < minZ - segmentLength) {
                        scene.remove(seg);
                        disposeMesh(seg);
                        arr.splice(i, 1);
                    }
                }
            });

            // 找到当前已有段的 min/max center z
            let currentMin = Infinity, currentMax = -Infinity;
            if (groundSegments.length) {
                groundSegments.forEach(s => { currentMin = Math.min(currentMin, s.position.z); currentMax = Math.max(currentMax, s.position.z); });
            }
            // 如果没有段，设为摄像机范围
            if (!isFinite(currentMin)) { currentMin = Math.floor(minZ / segmentLength) * segmentLength; currentMax = Math.floor(maxZ / segmentLength) * segmentLength; }

            // 在前方（更小 z 值）补充段，直到覆盖 minZ
            for (let z = currentMin - segmentLength; z >= minZ; z -= segmentLength) {
                const g = createGroundSegment(z, true);
                groundSegments.push(g);
                if (g._animateIn) g._animateIn();
                ['-4','0','4'].forEach(k => {
                    const lane = createLaneSegment(parseInt(k), z);
                    laneSegments[k].push(lane);
                });
            }

            // 在后方（更大 z 值）补充段，直到覆盖 maxZ
            for (let z = currentMax + segmentLength; z <= maxZ; z += segmentLength) {
                const g = createGroundSegment(z, true);
                groundSegments.push(g);
                if (g._animateIn) g._animateIn();
                ['-4','0','4'].forEach(k => {
                    const lane = createLaneSegment(parseInt(k), z);
                    laneSegments[k].push(lane);
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // 减少碰撞冷却
            if (hitCooldown > 0) hitCooldown--;
            
            // 如果游戏暂停，跳过更新逻辑
            if (isPaused) {
                composer.render();
                return;
            }

            // 专注度与速度耦合 [cite: 10, 16, 33]
            const baseSpeed = 0.08 + 0.00005 * Math.pow(focusValue, 2);
            const currentSpeed = baseSpeed * speedMultiplier;
            player.position.z -= currentSpeed;

            // 使用陀螺仪/焦点数据控制角色移动
            updatePlayerPositionFromGyro();

            // 使用 BLOCK_SIZE 确保玩家精确移动到与轨道对齐的位置
            player.position.x += (currentLane * BLOCK_SIZE - player.position.x) * 0.1;

            // 更新并维护无限地面与轨道（移到相机更新后以使用更新后的 camera.position）

            // 碰撞与跳过检测（并处理跳过得分）
            obstacles.forEach((obs, index) => {
                const dz = obs.position.z - player.position.z;
                const dx = obs.position.x - player.position.x;

                // 当到达近距离时，记录是否是跳跃通过
                // 使用与轨道间距相匹配的阈值以避免左右偏移判定错误
                if (Math.abs(dz) < 0.8 && Math.abs(dx) < (BLOCK_SIZE * 0.3)) {
                    if (player.position.y > 1.5) {
                        // 玩家在空中，通过盒子视为跳过
                        obs._jumped = true;
                    } else {
                        // 玩家不在空中且在同轨道 => 碰撞
                        if (hitCooldown <= 0 && !isFlashing && !obs._scored) {
                            obs._scored = true; // 防止重复处理
                            onPlayerHit();
                        }
                    }
                }

                // 当障碍物被玩家越过（玩家位置继续向前）且尚未被计分
                if (!obs._scored && dz > 1) {
                    if (obs._jumped) {
                        obs._scored = true;
                        score = Math.max(0, score + 2);
                        showScoreChange(2);
                    } else {
                        // 未跳跃也标记已通过，避免重复检查
                        obs._scored = true;
                    }
                }
            });

            // 相机动态 [cite: 11]
            // 将相机 X 完全跟随玩家，使玩家在左右轨道切换时保持居中（仍保留平滑插值）
            camera.position.lerp(new THREE.Vector3(player.position.x, 5, player.position.z + 10), 0.12);
            camera.lookAt(player.position.x, 0, player.position.z - 5);

            // 天空球跟随相机（始终保持包裹）
            if (skyMesh) {
                skyMesh.position.copy(camera.position);
            }

            // 更新并维护无限地面与轨道（使用已更新的 camera.position）
            updateInfiniteGroundAndLanes();

            // 每秒根据 attention 更新积分与速度（在 animate 循环中以定时器方式触发）
            const now = performance.now();
            if (now - lastAttnTick >= attnTickInterval) {
                lastAttnTick = now;
                applyAttnEffects();
            }

            // 更新 UI [cite: 38]
            document.getElementById('score-val').innerText = score;
            // 实时显示 attention（顶部），保留右侧 attn 精确值
            document.getElementById('attn-top').innerText = Math.round(attention_value);
            document.getElementById('attn-bar').style.width = Math.min(100, Math.max(0, attention_value)) + '%';

            // 能量条边框光晕随注意力变化
            const barContainer = document.querySelector('.energy-bar-container');
            if (barContainer) {
                if (attention_value > 70) {
                    barContainer.style.boxShadow = '0 0 25px rgba(0,255,136,0.6)';
                } else if (attention_value > 30) {
                    barContainer.style.boxShadow = '0 0 15px rgba(255,217,61,0.4)';
                } else {
                    barContainer.style.boxShadow = '0 0 10px rgba(255,50,50,0.3)';
                }
            }

            // 更新隐蔽的算法数据显示
            document.getElementById('gyro-x').innerText = gyroscope_x.toFixed(2);
            document.getElementById('gyro-y').innerText = gyroscope_y.toFixed(2);
            document.getElementById('gyro-z').innerText = gyroscope_z.toFixed(2);
            document.getElementById('attn-val').innerText = attention_value.toFixed(2);
            document.getElementById('cursor-x').innerText = filtered_focus_x.toFixed(0);
            document.getElementById('cursor-y').innerText = filtered_focus_y.toFixed(0);

            // 模拟模式：当 WebSocket 未连接或手动开启时，注入模拟注意力值
            if (simMode !== 'off') {
                updateSimAttn(performance.now());
            }

            composer.render();
        }

        // ---------- 模拟注意力系统 ----------
        function setSimMode(mode) {
            simMode = mode;
            // 更新按钮高亮
            ['off','low','high','auto'].forEach(m => {
                const btn = document.getElementById('sim-btn-' + m);
                if (btn) btn.classList.toggle('active', m === mode);
            });
            // 初始化目标值
            if (mode === 'low')  { simAttnValue = 15; simAttnTarget = 15; }
            if (mode === 'high') { simAttnValue = 65; simAttnTarget = 65; }
            if (mode === 'auto') { simAttnValue = 50; simAttnTarget = 50; }
            const display = document.getElementById('sim-val-display');
            if (display) display.textContent = mode === 'off' ? 'OFF' : mode.toUpperCase();
        }

        function updateSimAttn(now) {
            // 定期更换目标值（随机漫步）
            if (now - simLastTick >= SIM_TICK_INTERVAL) {
                simLastTick = now;
                let lo, hi;
                if (simMode === 'low')       { lo = 0;  hi = 29; }
                else if (simMode === 'high')  { lo = 31; hi = 100; }
                else                          { lo = 0;  hi = 100; } // auto

                // 在当前目标附近随机漫步，保持缓慢变化
                const range = hi - lo;
                const step = (Math.random() - 0.5) * range * 0.4;
                simAttnTarget = Math.max(lo, Math.min(hi, simAttnTarget + step));
            }
            // 平滑趋近目标
            simAttnValue += (simAttnTarget - simAttnValue) * SIM_LERP_SPEED;
            simAttnValue = Math.max(0, Math.min(100, simAttnValue));

            // 注入到全局注意力变量
            attention_value = simAttnValue;
            focusValue = simAttnValue;

            // 同时更新模拟面板显示
            const display = document.getElementById('sim-val-display');
            if (display && simMode !== 'off') {
                display.textContent = simAttnValue.toFixed(1);
            }
        }

        // 换道冷却帧数，防止一次跨两轨
        let laneChangeCooldown = 0;
        const LANE_CHANGE_COOLDOWN_FRAMES = 45;  // 约0.75秒冷却
        
        // 陀螺仪基准值和阈值
        const GYRO_Y_BASELINE = 270;  // GyroY 基准值（面向屏幕时）
        const GYRO_Y_JUMP_THRESHOLD = 260;  // GyroY 减小到此值触发跳跃
        const GYRO_Z_BASELINE = 170;  // GyroZ 基准值
        const GYRO_Z_LEFT_THRESHOLD = 180;  // GyroZ 增大到此值左移
        const GYRO_Z_RIGHT_THRESHOLD = 160;  // GyroZ 减小到此值右移
        
        // 上一帧的陀螺仪数据，用于检测变化
        let last_gyro_y_for_jump = GYRO_Y_BASELINE;
        let last_gyro_z_for_lane = GYRO_Z_BASELINE;

        // 根据陀螺仪数据更新角色位置
        function updatePlayerPositionFromGyro() {
            // WebSocket 未连接时，不使用陀螺仪控制轨道
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            
            // 减少换道冷却
            if (laneChangeCooldown > 0) laneChangeCooldown--;
            
            // GyroY 控制跳跃：值减小到阈值以下触发跳跃
            if (gyroscope_y < GYRO_Y_JUMP_THRESHOLD && last_gyro_y_for_jump >= GYRO_Y_JUMP_THRESHOLD) {
                // 检测到 GyroY 向下跨越阈值，触发跳跃
                if (player.position.y <= 1.1) {
                    gsap.to(player.position, { y: 3, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 });
                }
            }
            
            // GyroZ 控制左右轨道切换
            if (laneChangeCooldown === 0) {
                // 向左移动：GyroZ 增大到阈值以上
                if (gyroscope_z > GYRO_Z_LEFT_THRESHOLD && last_gyro_z_for_lane <= GYRO_Z_LEFT_THRESHOLD) {
                    if (currentLane > -1) {
                        currentLane--;
                        laneChangeCooldown = LANE_CHANGE_COOLDOWN_FRAMES;
                    }
                }
                // 向右移动：GyroZ 减小到阈值以下
                else if (gyroscope_z < GYRO_Z_RIGHT_THRESHOLD && last_gyro_z_for_lane >= GYRO_Z_RIGHT_THRESHOLD) {
                    if (currentLane < 1) {
                        currentLane++;
                        laneChangeCooldown = LANE_CHANGE_COOLDOWN_FRAMES;
                    }
                }
            }
            
            // 更新上一帧的陀螺仪数据
            last_gyro_y_for_jump = gyroscope_y;
            last_gyro_z_for_lane = gyroscope_z;
        }

        // 键盘控制逻辑
        document.addEventListener('keydown', (e) => {
            // 防止空格键滚动页面
            if (e.key === ' ' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
            }
            
            if (isPaused && e.key !== 'p' && e.key !== 'P') return;
            
            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    // 向左移动轨道
                    if (currentLane > -1) {
                        currentLane--;
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    // 向右移动轨道
                    if (currentLane < 1) {
                        currentLane++;
                    }
                    break;
                case ' ':
                    // 空格跳跃
                    if (player.position.y <= 1.1) {
                        gsap.to(player.position, { y: 3, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 });
                    }
                    break;
                case 'p':
                case 'P':
                    togglePause();
                    break;
            }
        });
        
        // 碰撞处理：角色闪烁 + 提醒文字
        function onPlayerHit() {
            hitCooldown = 60;  // 约1秒冷却（60fps）
            
            // 扣分惩罚：碰到箱子 -5 分，最低为 0
            score = Math.max(0, score - 5);
            showScoreChange(-5);

            // 角色双闪效果
            flashPlayer();
            
            // 显示提醒文字
            showReminder();
        }
        
        // 角色双闪效果
        function flashPlayer() {
            isFlashing = true;
            const originalEmissiveIntensity = player.material.emissiveIntensity;
            const originalColor = player.material.color.getHex();
            const originalEmissive = player.material.emissive.getHex();
            
            // 使用 GSAP 时间线实现双闪
            const tl = gsap.timeline({ onComplete: () => { isFlashing = false; } });
            
            // 第一次闪烁 - 变红
            tl.to(player.material, { 
                emissiveIntensity: 2.0, 
                duration: 0.08,
                onStart: () => { player.material.color.set(0xff4444); player.material.emissive.set(0xff0000); }
            })
            .to(player.material, { 
                emissiveIntensity: originalEmissiveIntensity, 
                duration: 0.08,
                onComplete: () => { player.material.color.setHex(originalColor); player.material.emissive.setHex(originalEmissive); }
            })
            // 短暂间隔
            .to({}, { duration: 0.06 })
            // 第二次闪烁 - 变红
            .to(player.material, { 
                emissiveIntensity: 2.0, 
                duration: 0.08,
                onStart: () => { player.material.color.set(0xff4444); player.material.emissive.set(0xff0000); }
            })
            .to(player.material, { 
                emissiveIntensity: originalEmissiveIntensity, 
                duration: 0.08,
                onComplete: () => { player.material.color.setHex(originalColor); player.material.emissive.setHex(originalEmissive); }
            });
        }
        
        // 显示专注提醒文字
        function showReminder() {
            const reminders = [
                '集中注意力哦～',
                '别走神，继续跑～',
                '专注，你可以的～',
                '保持专注，冲呀～',
                '注意力集中起来～',
                '加油，别被干扰～',
                '盯紧前方哦～',
                '稳住，集中精神～'
            ];
            const msg = reminders[Math.floor(Math.random() * reminders.length)];
            const reminderEl = document.getElementById('reminder');

            // 终止之前的动画
            gsap.killTweensOf(reminderEl);

            reminderEl.textContent = msg;
            reminderEl.classList.remove('show');

            // 使用 GSAP 实现柔和的出现→悬浮→淡出动画
            reminderEl.classList.add('show');
            gsap.fromTo(reminderEl,
                { opacity: 0, scale: 0.85, xPercent: -50, yPercent: -50, filter: 'blur(4px)' },
                { opacity: 1, scale: 1.05, xPercent: -50, yPercent: -50, filter: 'blur(0px)', duration: 0.3, ease: 'power2.out' }
            );
            gsap.to(reminderEl, {
                scale: 1.0,
                xPercent: -50,
                yPercent: -50,
                duration: 0.2,
                delay: 0.3,
                ease: 'power2.out'
            });
            gsap.to(reminderEl, {
                opacity: 0,
                scale: 1.02,
                xPercent: -50,
                yPercent: -72,
                filter: 'blur(3px)',
                duration: 1.8,
                delay: 0.6,
                ease: 'power2.out',
                onComplete: () => {
                    reminderEl.classList.remove('show');
                }
            });
        }

        // 暂停/继续游戏
        function togglePause() {
            isPaused = !isPaused;
        }

        // 更新算法数据的函数
        function updateAlgorithmData(gyroX, gyroY, gyroZ, attention, focusWidth, focusHeight, focusAreaX, focusAreaY, focusX, focusY) {
            gyroscope_x = gyroX || 0;
            gyroscope_y = gyroY || 0;
            gyroscope_z = gyroZ || 0;
            // 对 attention 值做尺度判定：如果后端返回 0-1 范围则乘100，否则假设已经是 0-100
            let attRaw = (attention !== undefined && attention !== null) ? attention : 0;
            if (attRaw > 1) {
                attention_value = attRaw;
            } else {
                attention_value = attRaw * 100;
            }
            focus_area_width = focusWidth || 0;
            focus_area_height = focusHeight || 0;
            focus_area_x = focusAreaX || 0;
            focus_area_y = focusAreaY || 0;
            focus_x = focusX || 0;
            focus_y = focusY || 0;
            
            // 对 focus_x / focus_y 做 EMA 低通滤波
            filtered_focus_x = FOCUS_EMA_ALPHA_X * focus_x + (1 - FOCUS_EMA_ALPHA_X) * filtered_focus_x;
            filtered_focus_y = FOCUS_EMA_ALPHA_Y * focus_y + (1 - FOCUS_EMA_ALPHA_Y) * filtered_focus_y;
            
            // 根据 attention 值实时更新专注度能量条 (确保 0-100 范围)
            focusValue = Math.min(100, Math.max(0, attention_value));
        }

        // 积分蒙太奇：复用单个元素，支持连续相同分数计数（显示为 "+5 x3"）
        let _montageEl = null;
        let _montageHideTimer = null;
        let _lastScoreKey = null; // e.g. "+5" or "-1"
        let _lastScoreCount = 0;

        function ensureMontageEl() {
            if (_montageEl && document.body.contains(_montageEl)) return _montageEl;
            _montageEl = document.createElement('div');
            _montageEl.className = 'score-montage';
            document.body.appendChild(_montageEl);
            return _montageEl;
        }

        function positionMontage() {
            const el = ensureMontageEl();
            const reminderEl = document.getElementById('reminder');
            // If reminder is visible and showing, position montage to its right at same vertical center
            if (reminderEl && reminderEl.classList.contains('show')) {
                const r = reminderEl.getBoundingClientRect();
                const m = el.getBoundingClientRect();
                const top = r.top + (r.height - m.height) / 2;
                const left = r.right + 10; // 10px gap
                el.style.left = left + 'px';
                el.style.top = top + 'px';
                el.style.marginLeft = '0';
                el._centered = false;
            } else {
                // center horizontally at the same height as reminder (or middle of viewport if reminder not found)
                let centerY = window.innerHeight * 0.32; // default 32%
                if (reminderEl) {
                    const r = reminderEl.getBoundingClientRect();
                    centerY = r.top + r.height / 2;
                }
                el.style.left = '50%';
                el.style.top = centerY + 'px';
                el.style.marginLeft = '';
                el._centered = true;
            }
        }

        function showScoreChange(amount) {
            if (!amount) return;
            const key = (amount > 0 ? '+' : '') + amount;
            const el = ensureMontageEl();

            // 连续相同分值计数：若与上次相同则自增计数并更新文本
            if (key === _lastScoreKey) {
                _lastScoreCount++;
            } else {
                _lastScoreKey = key;
                _lastScoreCount = 1;
            }

            // 文本格式：
            el.classList.remove('pos', 'neg');
            el.classList.add(amount > 0 ? 'pos' : 'neg');
            const times = _lastScoreCount > 1 ? (' x' + _lastScoreCount) : '';
            el.textContent = key + times;

            // 重新定位（以便在提醒出现时靠右显示）
            positionMontage();

            // 终止之前的动画
            gsap.killTweensOf(el);

            // 显示元素
            el.classList.add('show');

            // 使用 GSAP 实现轻柔上浮淡出动画
            const xPct = el._centered ? -50 : 0;
            gsap.set(el, { xPercent: xPct, yPercent: -50 });
            gsap.fromTo(el,
                { opacity: 0, y: 6, xPercent: xPct, yPercent: -50 },
                { opacity: 1, y: 0, xPercent: xPct, yPercent: -50, duration: 0.25, ease: 'power2.out' }
            );
            gsap.to(el, {
                opacity: 0,
                y: -34,
                xPercent: xPct,
                yPercent: -50,
                duration: 1.1,
                delay: 0.2,
                ease: 'power2.out',
                onComplete: () => {
                    el.classList.remove('show');
                    _lastScoreKey = null;
                    _lastScoreCount = 0;
                }
            });

            // 重置隐藏计时器
            if (_montageHideTimer) clearTimeout(_montageHideTimer);
            _montageHideTimer = setTimeout(() => {
                el.classList.remove('show');
                _lastScoreKey = null;
                _lastScoreCount = 0;
                _montageHideTimer = null;
            }, 1500);
        }

        // 根据注意力值更新场景视觉效果
        function updateSceneVisuals(att) {
            const t = att / 100;

            // 天空颜色联动
            if (skyMesh) {
                const u = skyMesh.material.uniforms;
                u.topColor.value.setHSL(0.75, THREE.MathUtils.lerp(0.2, 0.6, t), THREE.MathUtils.lerp(0.05, 0.25, t));
                u.midColor.value.setHSL(0.78, THREE.MathUtils.lerp(0.2, 0.5, t), THREE.MathUtils.lerp(0.3, 0.7, t));
                u.bottomColor.value.setHSL(
                    THREE.MathUtils.lerp(0.0, 0.95, t),
                    THREE.MathUtils.lerp(0.2, 0.4, t),
                    THREE.MathUtils.lerp(0.3, 0.8, t)
                );
                u.sunY.value = THREE.MathUtils.lerp(0.05, 0.25, t);
                u.sunColor.value.setHSL(
                    THREE.MathUtils.lerp(0.05, 0.12, t),
                    THREE.MathUtils.lerp(0.5, 0.8, t),
                    THREE.MathUtils.lerp(0.3, 0.7, t)
                );
            }

            // 雾色渐变
            const fogColor = new THREE.Color().setHSL(0.78, THREE.MathUtils.lerp(0.1, 0.4, t), THREE.MathUtils.lerp(0.3, 0.7, t));
            scene.fog.color = fogColor;
            scene.fog.near = THREE.MathUtils.lerp(5, 20, t);
            scene.fog.far  = THREE.MathUtils.lerp(30, 80, t);

            // Bloom 强度
            if (composer && composer.passes && composer.passes[1]) {
                composer.passes[1].strength = THREE.MathUtils.lerp(0.15, 0.7, t);
            }

            // 暗角程度
            if (composer && composer.passes && composer.passes[2]) {
                composer.passes[2].uniforms["darkness"].value = THREE.MathUtils.lerp(2.5, 0.8, t);
                composer.passes[2].uniforms["offset"].value   = THREE.MathUtils.lerp(0.6, 1.2, t);
            }
        }

        // 每秒根据 attention 值调整积分与速度
        function applyAttnEffects() {
            const att = Math.min(100, Math.max(0, attention_value));
            if (att < 10) {
                // attention < 10: 每次 -1（但不得低于0），速度变慢
                if (score > 0) {
                    score = Math.max(0, score - 1);
                    showScoreChange(-1);
                }
                speedMultiplier = 0.6;
            } else if (att <= 30) {
                // attention 10~30: +1，速度正常
                score = Math.max(0, score + 1);
                showScoreChange(1);
                speedMultiplier = 1.0;
            } else {
                // attention >30: +5，速度加快
                score = Math.max(0, score + 5);
                showScoreChange(5);
                speedMultiplier = 1.4;
            }

            // 根据注意力动态调整环境视觉
            updateSceneVisuals(att);
        }

        init();
    </script>
</body>
</html>
