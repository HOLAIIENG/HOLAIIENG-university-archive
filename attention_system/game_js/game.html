<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackrabbit</title>
    <style>
        canvas{
            position: absolute;
            margin: 0px;
            padding: 0px;
            height: 100%;
            width: 100%;
        }
        body{
            margin: 0px;
            padding: 0px;
        }
        #cursor{
            position: absolute;
            z-index: 9999;
            
            top: calc(50% - 1vh);
            left: calc(50% - 1vh);
            height:2vh;
            width:2vh;
            border-radius: 50%;
            border: 0.2vh solid white;
            mix-blend-mode: difference;
        }
        /* 隐蔽的算法数据显示（右上角） */
        #algorithm-data {
            position: absolute;
            top: 8px;
            right: 8px;
            color: rgba(255,255,255,0.28);
            font-size: 11px;
            text-align: right;
            z-index: 9998;
            pointer-events: none;
            font-family: monospace;
            line-height: 1.2;
            backdrop-filter: blur(2px);
        }
        #algorithm-data div { margin-bottom: 2px; }
        /* 隐蔽的自动前进开关（左上角） */
        #auto-run-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 9999;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 8px;
            font-size: 12px;
            font-family: monospace;
            border-radius: 6px;
            cursor: pointer;
            backdrop-filter: blur(2px);
            pointer-events: auto;
            opacity: 0.9;
        }
        #auto-run-btn.inactive { opacity: 0.45; }
    </style>
</head>
<body>
    <!-- 自动前进开关（默认开启，隐藏且不打扰） -->
    <button id="auto-run-btn" title="切换自动前进">AutoRun: ON</button>
    <div id="cursor"></div>
    <!-- 隐蔽的算法数据显示容器（参考 game/index.html 的实现） -->
    <div id="algorithm-data">
        <div>GyroX: <span id="gyro-x">0.00</span></div>
        <div>GyroY: <span id="gyro-y">0.00</span></div>
        <div>GyroZ: <span id="gyro-z">0.00</span></div>
        <div>Attn: <span id="attn-val">0.00</span></div>
        <div>CursorX: <span id="cursor-x">0</span></div>
        <div>CursorY: <span id="cursor-y">0</span></div>
    </div>
</body>
<script src="libs.js"></script>
<script src="animation.js"></script>
<script src="rendering.js"></script>
<script src="graphics.js"></script>
<script src="player.js"></script>
<script src="ball.js"></script>
<script src="game.js"></script>
<script>
    // WebSocket for algorithm data (隐蔽显示，参考 index.html 的逻辑)
    (function(){
        const WS_URL = 'ws://localhost:8765';
        let ws = null;

        function initWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                ws.onopen = function() { console.log('[WebSocket] 已连接到服务器'); };
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        updateAlgorithmData(
                            data.gyroscope_x, data.gyroscope_y, data.gyroscope_z,
                            data.attention, data.focus_area_width, data.focus_area_height,
                            data.focus_area_x, data.focus_area_y, data.focus_x, data.focus_y
                        );
                    } catch (e) { console.error('[WebSocket] 数据解析错误:', e); }
                };
                ws.onerror = function(err) { console.error('[WebSocket] 错误:', err); };
                ws.onclose = function() { console.log('[WebSocket] 连接已关闭，5秒后重连...'); setTimeout(initWebSocket, 5000); };
            } catch (e) {
                console.error('[WebSocket] 连接失败:', e);
            }
        }

        function updateAlgorithmData(gyroX, gyroY, gyroZ, attention, focusWidth, focusHeight, focusAreaX, focusAreaY, focusX, focusY) {
            // 更新 DOM 显示
            document.getElementById('gyro-x').innerText = (gyroX || 0).toFixed(2);
            document.getElementById('gyro-y').innerText = (gyroY || 0).toFixed(2);
            document.getElementById('gyro-z').innerText = (gyroZ || 0).toFixed(2);
            document.getElementById('attn-val').innerText = (attention || 0).toFixed(2);
            document.getElementById('cursor-x').innerText = Math.round(focusX || 0);
            document.getElementById('cursor-y').innerText = Math.round(focusY || 0);

            // 暴露原始全局变量
            window.gyroscope_x = gyroX || 0;
            window.gyroscope_y = gyroY || 0;
            window.gyroscope_z = gyroZ || 0;
            window.attention_value = attention || 0;
            window.focus_x = focusX || 0;
            window.focus_y = focusY || 0;

            // 初始化平滑与映射参数（可在控制台调整）
            if(typeof window.gyroAlpha === 'undefined') window.gyroAlpha = 0.12; // EMA alpha (0-1), 越大更跟随
            // 默认增益增大以提升灵敏度（可通过 UI 调整）
            if(typeof window.gyroToAngleGain === 'undefined') window.gyroToAngleGain = 0.06; // 将 gyroscope_x 映射为目标角度的增益（弧度/单位）
            if(typeof window.gyroLerpSpeed === 'undefined') window.gyroLerpSpeed = 0.12; // 角度插值速度基准
            if(typeof window.gyroControlEnabled === 'undefined') window.gyroControlEnabled = true;

            // 指数移动平均（EMA）对 gyroscope_x 做低通滤波
            if(typeof window.smoothedGyroX === 'undefined'){
                window.smoothedGyroX = window.gyroscope_x;
            } else {
                const a = window.gyroAlpha;
                window.smoothedGyroX = a * (window.gyroscope_x) + (1 - a) * window.smoothedGyroX;
            }

            // 初始化（如果尚未创建）小型调节 UI
            if(!document.getElementById('gyro-ui')){
                const ui = document.createElement('div');
                ui.id = 'gyro-ui';
                ui.innerHTML = `
                    <div class="label">Gyro Ctrl</div>
                    <div class="row"><label>alpha</label><input id="gyro-alpha" type="range" min="0.01" max="0.6" step="0.01"></div>
                    <div class="row"><label>gain</label><input id="gyro-gain" type="range" min="0.005" max="0.2" step="0.005"></div>
                    <div class="row"><label>lerp</label><input id="gyro-lerp" type="range" min="0.01" max="0.6" step="0.01"></div>
                    <div class="row"><button id="gyro-toggle">ON</button></div>
                `;
                // 简单样式
                ui.style.position = 'absolute';
                ui.style.left = '8px';
                ui.style.top = '44px';
                ui.style.zIndex = 10000;
                ui.style.background = 'rgba(0,0,0,0.18)';
                ui.style.color = 'rgba(255,255,255,0.85)';
                ui.style.fontFamily = 'monospace';
                ui.style.fontSize = '11px';
                ui.style.padding = '6px';
                ui.style.borderRadius = '6px';
                ui.style.backdropFilter = 'blur(2px)';
                ui.style.opacity = '0.85';
                ui.style.pointerEvents = 'auto';
                ui.style.width = '136px';
                ui.style.boxSizing = 'border-box';
                ui.querySelectorAll('.row').forEach; // noop for safety
                document.body.appendChild(ui);

                // Insert small CSS for elements
                const style = document.createElement('style');
                style.innerHTML = `
                    #gyro-ui .row{display:flex;align-items:center;justify-content:space-between;margin:4px 0}
                    #gyro-ui label{width:36px;color:rgba(255,255,255,0.7)}
                    #gyro-ui input{flex:1;margin-left:6px}
                    /* range (slider) - 黑灰主题 */
                    #gyro-ui input[type=range]{ -webkit-appearance:none; appearance:none; height:6px; background:transparent; }
                    #gyro-ui input[type=range]::-webkit-slider-runnable-track{ height:6px; background:#444; border-radius:6px; }
                    #gyro-ui input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#111; border:2px solid #777; margin-top:-4px; }
                    #gyro-ui input[type=range]::-moz-range-track{ height:6px; background:#444; border-radius:6px; }
                    #gyro-ui input[type=range]::-moz-range-thumb{ width:14px; height:14px; border-radius:50%; background:#111; border:2px solid #777; }
                    #gyro-ui button{ width:48px; height:22px; border-radius:4px; background:#222; color:#ddd; border:1px solid #444; cursor:pointer }
                `;
                document.head.appendChild(style);

                // Bind controls
                const alphaEl = document.getElementById('gyro-alpha');
                const gainEl = document.getElementById('gyro-gain');
                const lerpEl = document.getElementById('gyro-lerp');
                const toggleEl = document.getElementById('gyro-toggle');

                function syncFromWindow(){
                    alphaEl.value = window.gyroAlpha;
                    gainEl.value = window.gyroToAngleGain;
                    lerpEl.value = window.gyroLerpSpeed;
                    toggleEl.textContent = window.gyroControlEnabled ? 'ON' : 'OFF';
                    toggleEl.style.opacity = window.gyroControlEnabled ? '0.95' : '0.4';
                }

                alphaEl.addEventListener('input', ()=>{ window.gyroAlpha = parseFloat(alphaEl.value); });
                gainEl.addEventListener('input', ()=>{ window.gyroToAngleGain = parseFloat(gainEl.value); });
                lerpEl.addEventListener('input', ()=>{ window.gyroLerpSpeed = parseFloat(lerpEl.value); });
                toggleEl.addEventListener('click', ()=>{ window.gyroControlEnabled = !window.gyroControlEnabled; syncFromWindow(); });

                // initialize values
                syncFromWindow();

                // Ctrl+G 快捷键：切换 gyro-ui 显示/隐藏（按住 Ctrl 再按 G）
                (function(){
                    let visible = true;
                    function handler(e){
                        if((e.ctrlKey || e.metaKey) && e.key && e.key.toLowerCase() === 'g'){
                            visible = !visible;
                            ui.style.display = visible ? '' : 'none';
                            // prevent browser shortcuts when toggling
                            e.preventDefault();
                        }
                    }
                    document.addEventListener('keydown', handler);
                })();
            }
        }

        // 启动连接
        initWebSocket();
    })();

    // 自动前进开关逻辑（默认开启）
    (function(){
        window.autoRun = true;
        const btn = document.getElementById('auto-run-btn');
        if(!btn) return;

        function updateBtn(){
            btn.textContent = 'AutoRun: ' + (window.autoRun ? 'ON' : 'OFF');
            if(window.autoRun){
                btn.classList.remove('inactive');
            } else {
                btn.classList.add('inactive');
            }
        }

        btn.addEventListener('click', (e)=>{
            window.autoRun = !window.autoRun;
            updateBtn();
        });

        // 初始化样式
        updateBtn();
    })();
</script>
</html>
