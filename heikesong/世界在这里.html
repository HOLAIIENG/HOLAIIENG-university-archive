<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界在这里 · 兴趣发现平台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --bg:#F3F0E8;--surface:#FFFFFF;--surface2:#F8F6F2;
  --text:#1C1A17;--text2:#5A5550;--text3:#9A948C;
  --accent:#B87428;--accent2:#4A7C6B;
  --border:#DDD8CF;--r:8px;--rl:12px;--rxl:16px;
  --shadow:0 4px 20px rgba(28,26,23,.1);--shadow2:0 8px 36px rgba(28,26,23,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hdr{height:54px;background:#1C1A17;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:1000}
.hdr-title{color:#F0E8D5;font-size:15px;font-weight:500;letter-spacing:.8px;white-space:nowrap}
.hdr-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.hdr-spacer{flex:1}
.nav-btn{padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;white-space:nowrap}
.nav-btn:hover{border-color:rgba(255,255,255,.4);color:#fff}
.nav-btn.act{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.content-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
/* map */
#map-container{flex:1;overflow:hidden;display:flex;flex-direction:column}
.mode-bar{height:46px;display:flex;align-items:center;padding:0 16px;gap:8px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.mode-btn{padding:5px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-btn.act{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.hint{margin-left:auto;font-size:11px;color:var(--text3)}
.map-and-panel{flex:1;display:flex;overflow:hidden}
#leaflet-map{flex:1;min-height:0}
/* markers (no scale with zoom) */
.map-pin{position:absolute;transform:translate(-50%,-14px);display:flex;flex-direction:column;align-items:center;cursor:pointer;pointer-events:all;user-select:none}
.pin-circle{width:28px;height:28px;border-radius:50%;background:rgba(184,116,40,.92);border:2.5px solid rgba(255,255,255,.95);box-shadow:0 2px 8px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .15s,background .15s}
.map-pin:hover .pin-circle,.map-pin.sel .pin-circle{transform:scale(1.25)}
.map-pin.sel .pin-circle{background:rgba(74,124,107,.92)}
.pin-name{font-size:10.5px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.95),0 0 10px rgba(0,0,0,.8);white-space:nowrap;margin-top:2px;letter-spacing:.2px}
/* explore popup */
.exp-popup{position:absolute;background:rgba(255,255,255,.97);border-radius:var(--rxl);padding:15px;border:1px solid var(--border);box-shadow:var(--shadow2);width:265px;z-index:800;animation:popIn .18s ease-out;pointer-events:all}
@keyframes popIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.exp-drag{cursor:move;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.exp-coords{font-size:10px;color:var(--text3);font-family:'SF Mono',Consolas,monospace;margin-bottom:8px;letter-spacing:.3px}
.exp-img{width:100%;height:95px;background:var(--surface2);border-radius:6px;border:1.5px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:11px;margin-bottom:9px;text-align:center;line-height:1.5}
/* location panel */
.loc-panel{width:315px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden;flex-shrink:0}
.lp-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.lp-scroll{flex:1;overflow-y:auto;padding:14px 16px}
.lp-foot{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.wonder-row{font-size:12px;color:var(--text);padding:6px 0;border-bottom:1px dashed var(--border);display:flex;gap:7px;line-height:1.4}
.img-ph{width:100%;height:130px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:11px;margin-bottom:12px;text-align:center;padding:8px;line-height:1.5}
/* tags */
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;background:#EBE5DB;color:var(--text2);margin:2px}
/* buttons */
.primary-btn{width:100%;padding:11px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .15s}
.primary-btn:hover{background:#9E641C;transform:translateY(-1px)}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px 6px;line-height:1;border-radius:4px;transition:color .15s}
.icon-btn:hover{color:var(--text)}
/* careers */
.career-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px;padding:16px}
.career-card{background:var(--surface);border-radius:var(--rl);padding:16px;border:1px solid var(--border);cursor:pointer;transition:all .18s}
.career-card:hover{transform:translateY(-3px);box-shadow:var(--shadow2);border-color:rgba(184,116,40,.3)}
/* records */
.rec-layout{display:flex;height:100%;overflow:hidden}
.rec-sidebar{width:210px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden;flex-shrink:0}
.rec-main{flex:1;overflow-y:auto;padding:16px}
.sid-item{padding:7px 10px;border-radius:var(--r);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin:1px 6px;transition:background .12s}
.sid-item:hover{background:var(--surface2)}
.sid-item.act{background:rgba(184,116,40,.12)}
.sid-label{font-size:12px;color:var(--text);display:flex;align-items:center;gap:5px}
.sid-item.act .sid-label{color:var(--accent);font-weight:500}
.badge{font-size:10px;background:#EBE5DB;color:var(--text3);padding:1px 6px;border-radius:8px;flex-shrink:0}
.rec-card{background:var(--surface);border-radius:var(--rl);padding:14px 15px;border:1px solid var(--border);margin-bottom:10px;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOut{to{opacity:0;transform:translateX(-16px) scaleY(.85)}}
.rec-del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:3px 5px;border-radius:4px;transition:all .15s;flex-shrink:0}
.rec-del-btn:hover{color:#c0392b;background:rgba(192,57,43,.08)}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(28,26,23,.45);display:flex;align-items:center;justify-content:center;z-index:3000;backdrop-filter:blur(3px)}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface);border-radius:var(--rxl);padding:24px;width:92%;max-width:450px;box-shadow:var(--shadow2);animation:modalIn .2s ease-out;max-height:92vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.opt-row{display:flex;gap:8px;margin-bottom:4px}
.opt-btn{flex:1;padding:10px;border-radius:var(--r);border:1px solid var(--border);background:transparent;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.act{border-color:var(--accent);background:rgba(184,116,40,.1)}
.opt-btn-title{font-size:13px;font-weight:500;color:var(--text)}
.opt-btn.act .opt-btn-title{color:var(--accent)}
.opt-btn-sub{font-size:11px;color:var(--text3);margin-top:2px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.chip:hover{border-color:var(--accent)}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.m-input{border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;width:100%;transition:border-color .15s}
.m-input:focus{border-color:var(--accent)}
.m-textarea{border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;width:100%;resize:none;height:74px;line-height:1.6;transition:border-color .15s}
.m-textarea:focus{border-color:var(--accent)}
.m-actions{display:flex;gap:8px}
.btn-cancel{flex:1;padding:10px;border-radius:var(--r);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;transition:all .15s}
.btn-cancel:hover{background:var(--surface2)}
.btn-save{flex:2;padding:10px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .15s}
.btn-save:hover{background:#9E641C}
.btn-save:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
/* toast */
.toast{position:fixed;top:18px;right:18px;padding:11px 18px;border-radius:var(--r);font-size:13px;font-weight:500;color:#fff;box-shadow:var(--shadow2);z-index:9999;animation:toastIn .25s ease-out}
.toast.success{background:#3A6B5E}
.toast.error{background:#8B3A3A}
@keyframes toastIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(18px)}}
/* empty */
.empty-state{text-align:center;padding:55px 20px;color:var(--text3)}
/* misc */
input{border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s}
input:focus{border-color:var(--accent)}
.leaflet-container{font-family:inherit!important}
.leaflet-control-attribution{font-size:9px!important;opacity:.55}
@media(max-width:640px){
  .nav-btn{padding:5px 10px;font-size:11px}
  .loc-panel{width:100%;border-left:none;border-top:1px solid var(--border);height:46vh}
  .map-and-panel{flex-direction:column}
  .career-grid{grid-template-columns:1fr 1fr;padding:12px;gap:10px}
  .rec-sidebar{width:165px}
}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-title">世界在这里</div>
    <div class="hdr-dot"></div>
    <div class="hdr-spacer"></div>
    <button class="nav-btn act" id="nb-map"     onclick="switchTab('map')">🗺 世界地图</button>
    <button class="nav-btn"     id="nb-careers" onclick="switchTab('careers')">💼 职业全书</button>
    <button class="nav-btn"     id="nb-records" onclick="switchTab('records')">📋 兴趣记录</button>
  </header>
  <!-- Map (always in DOM, never destroyed) -->
  <div id="map-container" class="content-area">
    <div class="mode-bar">
      <button class="mode-btn act" id="mb-china" onclick="switchMode('china')">🗺 中国地图</button>
      <button class="mode-btn" id="mb-world" onclick="switchMode('world')">🌍 世界各国</button>
      <span class="hint" id="map-hint">30个城市 · 点击标记看故事 · 任意处探索</span>
    </div>
    <div class="map-and-panel">
      <div id="leaflet-map"></div>
      <div id="loc-panel-area"></div>
    </div>
  </div>
  <!-- Non-map tabs -->
  <div id="content" class="content-area" style="display:none"></div>
</div>
<div class="modal-overlay hidden" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ═══════════════════════════════════════════════
   中国城市数据（30个）
═══════════════════════════════════════════════ */
const CHINA=[
 {id:'beijing',name:'北京',lat:39.9,lon:116.4,emoji:'🏛️',tagline:'六百年帝都，胡同里的烟火气',
  story:'北京的一天从胡同里的豆汁声开始。老人们在结冰的湖面打太极，街边有修钢笔的师傅，有画脸谱的艺人。故宫的猫住在朱红色宫墙里，不在乎任何人。从四合院到摩天楼，这座城市把一千年压缩在同一条街上。',
  wonders:['故宫与四季更迭','胡同早点摊','长城上的风','798艺术区'],tags:['历史','文化','城市']},
 {id:'shanghai',name:'上海',lat:31.2,lon:121.5,emoji:'🌆',tagline:'东方与西方在这里握手',
  story:'外滩对岸的浦东，三十年前还是农田，现在是摩天楼。一栋老洋房里可能住着十户人家，说五种方言。黄浦江每天带走潮水，也带来来自世界各地的船。这座城市从不睡觉。',
  wonders:['外滩夜景','弄堂石库门','苏州河涂鸦','周边水乡'],tags:['城市','建筑','现代']},
 {id:'chengdu',name:'成都',lat:30.7,lon:104.1,emoji:'🐼',tagline:'熊猫和火锅，慢下来的城市',
  story:'成都人发明了"悠闲"这个词的生活版本。茶馆里的人一坐就是一个下午，打麻将、晒太阳。大熊猫在竹林里打滚，不在乎任何日程。',
  wonders:['熊猫繁育基地','宽窄巷子茶馆','青城山古道','夜晚火锅街'],tags:['自然','动物','生活']},
 {id:'chongqing',name:'重庆',lat:29.6,lon:106.5,emoji:'🌃',tagline:'山城雾都，长江与嘉陵江在此汇合',
  story:'重庆是世界上最大的山城之一，楼房随着山坡的起伏而盖，有些楼房的一楼是别人的二十楼。两条大江在朝天门交汇，夜晚从山上往下看，万家灯火像撒落的星星。',
  wonders:['朝天门码头','洪崖洞夜景','磁器口古镇','长江索道'],tags:['城市','山地','夜景']},
 {id:'xian',name:'西安',lat:34.3,lon:108.9,emoji:'⚔️',tagline:'地下沉睡的帝国，城墙上的自行车',
  story:'西安的地下埋着太多秘密。兵马俑是农民打井时发现的——八千个真人大小的陶俑，每张脸都不同，在地下等了两千年。城墙至今完整，可以骑自行车绕城一圈。',
  wonders:['秦始皇兵马俑','古城墙骑行','回民街美食','大雁塔'],tags:['历史','考古','文化']},
 {id:'wuhan',name:'武汉',lat:30.6,lon:114.3,emoji:'🌸',tagline:'九省通衢，黄鹤楼上俯瞰两江',
  story:'武汉是"九省通衢"，中国最重要的交通枢纽之一。每年三月，武汉大学的樱花开放，吸引数十万人前来。黄鹤楼是中国四大名楼之首，站在上面可以俯瞰整个武汉三镇。',
  wonders:['黄鹤楼','武大樱花','武汉长江大桥','东湖磨山'],tags:['历史','自然','城市']},
 {id:'nanjing',name:'南京',lat:32.1,lon:118.8,emoji:'🏰',tagline:'六朝古都，秦淮河两岸的千年风华',
  story:'南京是中国古都之中最让人感到历史重量的城市之一。明城墙绵延三十五公里，是世界上最长的古代城墙。秦淮河夜市从唐朝延续至今，乌衣巷里住过王谢两大家族。',
  wonders:['明孝陵','秦淮河夜游','夫子庙','中山陵'],tags:['历史','文化','城市']},
 {id:'hangzhou',name:'杭州',lat:30.3,lon:120.2,emoji:'🌿',tagline:'上有天堂，下有苏杭',
  story:'西湖的美是历代诗人用尽了形容词也没写完的。苏东坡在这里修了苏堤，白居易在这里修了白堤，他们用诗歌和石头把西湖的样子固定下来。秋天的龙井茶，冬天的腊八粥，这座城市每一个季节都有仪式感。',
  wonders:['西湖十景','龙井茶园','乌镇夜晚','良渚古城遗址'],tags:['自然','文化','茶道']},
 {id:'suzhou',name:'苏州',lat:31.3,lon:120.6,emoji:'🎋',tagline:'园林之城，江南最精致的角落',
  story:'苏州的古典园林是中国园林艺术的巅峰——几亩地里装下了山水天地。园丁用假山、水池、廊道、植物营造出无限延展的意境。苏州评弹的声音从老茶馆里飘出，混着太湖的水气。',
  wonders:['拙政园','虎丘斜塔','周庄古镇','苏州刺绣博物馆'],tags:['园林','文化','艺术']},
 {id:'guangzhou',name:'广州',lat:23.1,lon:113.3,emoji:'🐉',tagline:'千年商都，早茶的故乡',
  story:'广州是中国最早对外开放的港口之一，两千年来一直是海上丝绸之路的起点。广州人一天可以喝三次茶——早茶、午茶、下午茶，每次都是一个家庭聚会的理由。',
  wonders:['陈家祠','珠江夜游','北京路步行街','长洲古岛'],tags:['历史','饮食','商业']},
 {id:'shenzhen',name:'深圳',lat:22.5,lon:114.1,emoji:'🏙️',tagline:'四十年从渔村到科技之都',
  story:'四十年前，深圳还是一个小渔村。改革开放后，这里成了中国最大的实验场。腾讯、华为、大疆都从这里起步。深圳今天的天际线像是一本关于中国速度的教科书。',
  wonders:['OCT华侨城艺术区','深南大道','东部华侨城山水实景','南澳海岛'],tags:['现代','科技','创业']},
 {id:'qingdao',name:'青岛',lat:36.1,lon:120.4,emoji:'🌊',tagline:'红瓦绿树，海风里有渔人的秘密',
  story:'青岛的海风有一种咸腥的鲜味。清晨五点，渔船回港，鱼市上有人专门给不知名的鱼取名字——有些鱼生活在一百米深的水下，从未见过阳光。',
  wonders:['崂山道观','海鲜市场清晨','德式老建筑群','栈桥海边'],tags:['海洋','自然','历史']},
 {id:'lhasa',name:'拉萨',lat:29.7,lon:91.1,emoji:'⛩️',tagline:'离太阳最近的城市，布达拉宫在云上',
  story:'拉萨的天蓝到一种不像真实的程度。布达拉宫建在山上，脚下是磕长头朝圣的藏族人，他们从几千公里外走来，只为见一面。高原的空气薄而干净，让每一口呼吸都变得郑重。',

  story:'英国是一个把古老传统和现代文明结合得最好的国家之一。白金汉宫的换岗仪式已经进行了数百年，地铁Tube是世界上最古老的地铁系统。苏格兰高地的古堡在雾中若隐若现，威士忌在橡木桶里沉睡多年等待被打开。',
  wonders:['大本钟与议会大厦','苏格兰高地','巨石阵','哈利·波特取景地'],tags:['历史','文化','文学']},
 {id:'germany',name:'德国',lat:52.5,lon:13.4,emoji:'🍺',tagline:'工程师的国度，黑森林与巴伐利亚城堡',
  story:'德国人对精确性和质量的执着举世闻名。奔驰、宝马、西门子都是德国品牌。新天鹅堡是迪士尼城堡的原型，矗立在巴伐利亚的山顶上，像一个童话。德国的圣诞市场有八百年历史，整个十二月都飘着肉桂和热红酒的香味。',
  wonders:['新天鹅堡','科隆大教堂','黑森林远足','慕尼黑啤酒节'],tags:['工业','历史','自然']},
 {id:'italy',name:'意大利',lat:41.9,lon:12.5,emoji:'🎨',tagline:'文艺复兴的摇篮，每块石头都有故事',
  story:'意大利是一个户外博物馆，随便走进一条街都可能遇到几百年前的教堂和雕像。米开朗基罗的大卫像、达芬奇的《最后的晚餐》、拉斐尔的壁画都在这里。威尼斯建在一百一十八个小岛上，出门就是运河，没有汽车。意大利面有三百多种形状，每种形状都有它的理由。',
  wonders:['罗马斗兽场','威尼斯贡多拉','佛罗伦萨乌菲兹美术馆','阿玛尔菲海岸'],tags:['艺术','历史','美食']},
 {id:'spain',name:'西班牙',lat:40.4,lon:-3.7,emoji:'🎸',tagline:'弗拉门戈与斗牛，激情之国',
  story:'西班牙是热情的——弗拉门戈舞蹈用脚踩出史诗，托马斯·庞贝节每年把数万人埋在番茄里。高迪的圣家族大教堂已经建了一百多年还没完工，因为工程太过精细复杂。圣地亚哥朝圣之路吸引了世界各地的人跋涉八百公里。',
  wonders:['圣家族大教堂','弗拉门戈表演','圣地亚哥朝圣之路','格拉纳达阿尔罕布拉宫'],tags:['艺术','文化','宗教']},
 {id:'italy_greece',name:'希腊',lat:37.9,lon:23.7,emoji:'🏛️',tagline:'西方文明的摇篮，白色小屋与蓝色海洋',
  story:'雅典卫城两千四百年来一直矗立在山顶上，见证了西方民主的诞生。希腊哲学家苏格拉底、柏拉图、亚里士多德在这里提出了影响人类思想至今的问题。圣托里尼的蓝顶白墙在爱琴海上闪闪发光，是世界上最被拍摄的风景之一。',
  wonders:['雅典卫城','圣托里尼日落','米科诺斯','奥林匹克遗址'],tags:['文明','历史','海岛']},
 {id:'norway',name:'挪威',lat:59.9,lon:10.7,emoji:'🌊',tagline:'峡湾王国，极光与仲夏白夜',
  story:'挪威的峡湾是冰川雕刻出的自然奇迹，深达几百米，两岸是垂直的山壁。冬天可以在这里看到北极光，夏天的午夜阳光不会落下。挪威人均幸福指数和人均阅读量都位居世界前列，这里的人极其热爱户外活动。',
  wonders:['盖朗厄尔峡湾','特罗姆瑟极光','卑尔根彩色木屋','挪威弗洛姆铁路'],tags:['自然','峡湾','极光']},
 {id:'iceland',name:'冰岛',lat:64.1,lon:-22.0,emoji:'🌋',tagline:'冰川与火山共存，人均读书最多的国家',
  story:'冰岛三分之一国土是熔岩荒地，也有欧洲最大的冰川。这里人均读书量世界第一，每十个人里有一个出过书。地热能量让全国暖气几乎免费，街道下铺着热管防止结冰。冬天可以看到极光，夏天可以在午夜打高尔夫。',
  wonders:['蓝湖地热温泉','极光追逐','火山口探索','冰川徒步'],tags:['自然','地质','极地']},
 {id:'russia',name:'俄罗斯',lat:55.7,lon:37.6,emoji:'🏔️',tagline:'世界最大的国家，西伯利亚的壮阔与神秘',
  story:'俄罗斯横跨十一个时区，从波罗的海到太平洋，是世界上面积最大的国家。贝加尔湖是世界上最深的淡水湖，储存了地球五分之一的淡水。西伯利亚的冬天可以达到零下六十度。莫斯科红场上的圣瓦西里主教座堂像一个彩色的洋葱头，是俄罗斯最标志性的建筑。',
  wonders:['红场与圣瓦西里教堂','贝加尔湖','西伯利亚铁路','冬宫博物馆'],tags:['文化','历史','探险']},
 {id:'czech',name:'捷克',lat:50.1,lon:14.4,emoji:'🏰',tagline:'童话里走出来的城市，布拉格百座塔',
  story:'布拉格被称为"百塔之城"，中世纪的建筑保存得异常完好，像是时间在这里停止了。布拉格城堡是世界上最大的城堡建筑群之一。捷克是世界上人均啤酒消费量最大的国家，每个村子都有自己的酿酒厂和配方。',
  wonders:['布拉格老城广场','布拉格城堡','查理大桥','克鲁姆洛夫古城'],tags:['历史','建筑','美食']},
 {id:'switzerland',name:'瑞士',lat:46.9,lon:7.4,emoji:'⛷️',tagline:'阿尔卑斯山的明珠，中立与精准的国度',
  story:'瑞士阿尔卑斯山的景色是欧洲最壮观的之一，少女峰终年积雪。这里有世界上最贵的手表和最好的巧克力，一块手表的制作可能需要三百道工序。瑞士是世界上最长时间保持和平中立的国家之一，因此成为无数国际组织的总部。',
  wonders:['少女峰缆车','因特拉肯','日内瓦湖畔','策马特小镇'],tags:['山脉','精工','自然']},
 /* 非洲 */
 {id:'egypt',name:'埃及',lat:30.1,lon:31.2,emoji:'🏺',tagline:'法老的国度，金字塔屹立四千年',
  story:'吉萨金字塔是地球上唯一保存完好的世界七大奇迹。四千五百年前，埃及人用两百三十万块石头堆成了胡夫金字塔，平均每块重两吨半——而且没有现代机械。尼罗河是埃及的生命线，文明的种子在它的滋养下生长了六千年。',
  wonders:['吉萨金字塔','卢克索神庙','阿布辛贝神殿','红海潜水'],tags:['文明','古迹','沙漠']},
 {id:'morocco',name:'摩洛哥',lat:34.0,lon:-6.8,emoji:'🌺',tagline:'撒哈拉边缘的神秘国度，蓝色城市与香料市场',
  story:'摩洛哥是北非最具魅力的国家之一。马拉喀什的集市广场是世界上最混乱也最有活力的地方，蛇舞者、说书人、香料商贩同时出现。舍夫沙万小城被漆成蓝白色，走在里面像是进入了蓝色的梦境。骑骆驼穿越撒哈拉沙漠是很多人一生中最难忘的体验。',
  wonders:['马拉喀什集市广场','舍夫沙万蓝色小城','撒哈拉沙漠骆驼','菲斯古城迷宫'],tags:['文化','沙漠','集市']},
 {id:'kenya',name:'肯尼亚',lat:-1.3,lon:36.8,emoji:'🦒',tagline:'野生动物的天堂，角马大迁徙的故乡',
  story:'每年七月到九月，两百万只角马从坦桑尼亚的塞伦盖蒂越过马赛马拉河，这是地球上规模最大的动物迁徙。长颈鹿的心脏有成年人那么大，才能把血泵到两米高的脑袋。马赛族战士用跳高来展示力量，他们的传统服饰是鲜红色的。',
  wonders:['马赛马拉大迁徙','乞力马扎罗山','蒙巴萨海岸','马赛族文化村'],tags:['动物','自然','文化']},
 {id:'southafrica',name:'南非',lat:-25.7,lon:28.2,emoji:'🦁',tagline:'世界的终点，好望角与非洲最南端',
  story:'南非是世界上生物多样性最丰富的国家之一——有超过两万种植物和一万种动物。克鲁格国家公园是非洲最大的野生动物园，"五大兽"（狮子、豹、大象、水牛、犀牛）都能在这里看到。好望角是连接大西洋和印度洋的地方，两种洋流在这里相遇。',
  wonders:['克鲁格公园五大兽','好望角','桌山缆车','罗本岛'],tags:['自然','动物','历史']},
 {id:'ethiopia',name:'埃塞俄比亚',lat:9.0,lon:38.7,emoji:'☕',tagline:'咖啡的故乡，最古老的基督教国度',
  story:'咖啡起源于埃塞俄比亚，当地有一个传说：一个牧羊人发现他的羊吃了某种浆果后特别兴奋，这就是咖啡的开端。埃塞俄比亚是世界上最古老的独立国家之一，拥有五千年有文字记载的历史。拉利贝拉的岩石教堂是从整块岩石中凿出来的，被认为是世界第八大奇迹。',
  wonders:['拉利贝拉岩石教堂','咖啡仪式','贡德尔城堡','达纳基勒火山地貌'],tags:['文明','宗教','咖啡']},
 {id:'tanzania',name:'坦桑尼亚',lat:-6.2,lon:35.7,emoji:'🦓',tagline:'塞伦盖蒂大草原，乞力马扎罗山顶的雪',
  story:'坦桑尼亚拥有非洲大陆最高峰乞力马扎罗山（海拔五八九五米），山顶常年覆盖冰雪，但气候变化正在让这片雪消失。塞伦盖蒂是世界上最著名的野生动物保护区，每年有约三百万动物在这里生活。桑给巴尔岛的香料贸易从阿拉伯人时代就开始了。',
  wonders:['乞力马扎罗攀登','塞伦盖蒂狮群','桑给巴尔香料岛','恩戈罗恩戈罗火山口'],tags:['自然','动物','登山']},
 /* 美洲 */
 {id:'usa',name:'美国',lat:38.9,lon:-77.0,emoji:'🗽',tagline:'移民国家，多元文化与自然奇观',
  story:'美国是一个由移民建立的国家，不同文化在这里融合形成了独特的美国文化。大峡谷是科罗拉多河用六百万年雕刻出的地球伤疤，深达一千八百米。黄石公园是地球上最大的超级火山的顶部，地热能量让这里有无数间歇泉和温泉。',
  wonders:['大峡谷','黄石公园间歇泉','纽约中央公园','夏威夷火山'],tags:['自然','多元','现代']},
 {id:'canada',name:'加拿大',lat:45.4,lon:-75.7,emoji:'🍁',tagline:'枫叶国度，落基山脉与极光天堂',
  story:'加拿大是世界上面积第二大的国家，拥有世界上最多的湖泊——占全球淡水湖总数的60%。班夫国家公园的路易丝湖在九月变成绿松石色，倒映着白雪皑皑的山峰。育空地区的极光是北半球最清晰最壮观的之一。',
  wonders:['班夫路易斯湖','极光（育空）','尼亚加拉大瀑布','魁北克冬季嘉年华'],tags:['自然','湖泊','极光']},
 {id:'mexico',name:'墨西哥',lat:19.4,lon:-99.1,emoji:'🌮',tagline:'玛雅文明的摇篮，色彩斑斓的活人节',
  story:'墨西哥是美洲文明最重要的发源地之一，玛雅人和阿兹特克人在这里建立了复杂的城市文明。亡灵节是墨西哥最重要的节日，人们用鲜花、蜡烛和食物欢迎去世的祖先回家。墨西哥的辣椒种类有一百多种，辣度跨越几十个等级。',
  wonders:['奇琴伊察玛雅遗址','瓦哈卡亡灵节','科巴金字塔攀登','蓝色龙舌兰产区'],tags:['文明','文化','美食']},
 {id:'brazil',name:'巴西',lat:-15.8,lon:-47.9,emoji:'⚽',tagline:'桑巴与足球，亚马逊雨林的家园',
  story:'巴西拥有世界上最大的热带雨林——亚马逊，产生了地球上25%的氧气。里约热内卢的基督山上，高三十八米的基督雕像张开双臂，俯瞰整个城市。巴西的狂欢节是世界上规模最大的节日，三百万人在街头跳桑巴舞。',
  wonders:['亚马逊河流探险','里约热内卢基督山','伊瓜苏大瀑布','潘塔纳尔湿地'],tags:['自然','文化','生物']},
 {id:'argentina',name:'阿根廷',lat:-34.6,lon:-58.4,emoji:'💃',tagline:'探戈的故乡，巴塔哥尼亚的荒野',
  story:'探戈起源于布宜诺斯艾利斯的贫民窟，后来征服了整个世界。巴塔哥尼亚是地球上最后的荒野之一，菲茨罗伊山的冰川和湖泊是徒步爱好者的圣地。阿根廷人均消耗牛肉量是世界第一，一个阿根廷人一年吃的牛肉相当于一头牛。',
  wonders:['伊瓜苏大瀑布（阿方）','巴塔哥尼亚菲茨罗伊山','布宜诺斯艾利斯探戈','蓝色冰川徒步'],tags:['自然','文化','美食']},
 {id:'peru',name:'秘鲁',lat:-12.0,lon:-77.0,emoji:'🦙',tagline:'印加帝国的遗迹，马丘比丘云端之城',
  story:'马丘比丘是世界上最令人惊叹的古代城市遗址之一，建于海拔两千四百米的山顶，西班牙人从未发现过它，因此保存完好。亚马逊河的源头在秘鲁安第斯山脉。羊驼（Alpaca）是安第斯山原住民的神圣动物，其毛比绵羊毛柔软三倍。',
  wonders:['马丘比丘','的的喀喀湖芦苇岛','纳斯卡线条','亚马逊雨林入口'],tags:['文明','自然','高原']},
 {id:'cuba',name:'古巴',lat:23.1,lon:-82.4,emoji:'🎵',tagline:'时间停止的岛国，雪茄与萨尔萨音乐',
  story:'古巴像是时间停止在二十世纪五十年代的地方。街上行驶的是几十年前的美国老爷车，五彩斑斓，发出欢快的引擎声。哈瓦那老城区的建筑在落日的橙光下显得格外迷人。萨尔萨音乐从每一扇打开的窗户飘出，古巴雪茄是世界上最著名的。',
  wonders:['哈瓦那老城区老爷车','特立尼达古城','维尼亚莱斯山谷','古巴雪茄工厂'],tags:['历史','音乐','文化']},
 /* 大洋洲 */
 {id:'australia',name:'澳大利亚',lat:-35.3,lon:149.1,emoji:'🦘',tagline:'倒置的大陆，独一无二的动植物',
  story:'澳大利亚是世界上最古老的大陆，有世界上最奇特的动物：袋鼠、考拉、鸭嘴兽……这些动物在其他任何地方都找不到。大堡礁是从太空就能看见的活体生物，由数十亿珊瑚虫构成。乌鲁鲁（艾尔斯岩）是一块高三百四十八米的单体巨岩，对原住民来说是神圣之地。',
  wonders:['大堡礁潜水','乌鲁鲁（艾尔斯岩）','悉尼歌剧院','蓝山国家公园'],tags:['自然','动物','海洋']},
 {id:'newzealand',name:'新西兰',lat:-41.3,lon:174.8,emoji:'🏔️',tagline:'《指环王》的拍摄地，人与自然完美共处',
  story:'新西兰是彼得·杰克逊选择拍摄《指环王》的地方，因为这里的自然风光如此完美，像是从想象中走出来的。这里的羊比人口多七倍。毛利人是新西兰的原住民，他们的哈卡战舞后来被全世界所知。',
  wonders:['霍比特村','峡湾国家公园米尔福德','罗托鲁瓦地热','汤加里罗火山远足'],tags:['自然','电影','文化']},
 {id:'fiji',name:'斐济',lat:-18.0,lon:178.0,emoji:'🌺',tagline:'南太平洋的珍珠，地球上最幸福的地方之一',
  story:'斐济人以微笑著称，多项研究显示斐济是世界上幸福感最高的国家之一。这里有三百三十多个岛屿，每个岛都有不同的颜色——翡翠色的丛林、白色的沙滩、蓝宝石色的海洋。斐济的珊瑚礁是世界上保存最完好的之一，被称为"珊瑚礁的软珊瑚首都"。',
  wonders:['珊瑚礁浮潜','传统村落拜访','日落帆船','雨林瀑布'],tags:['海岛','海洋','幸福']},
 /* 极地 */
 {id:'arctic_svalbard',name:'北极地区',lat:78.0,lon:16.0,emoji:'❄️',tagline:'极光与北极熊，地球的顶点',
  story:'挪威斯瓦尔巴群岛是人类能够合法定居的最北端地区。这里的北极熊数量比人还多，出门需要带枪防熊。冬天极夜长达四个月，但极光会把天空染成绿色和紫色。夏天极昼二十四小时都是白天，午夜的太阳毫不疲倦地照耀着冰川。',

 {id:'marine',title:'海洋生物学家',emoji:'🐙',tagline:'给从未见过的生物取名字',tags:['海洋','生物','自然','科学'],ifYouLike:'你喜欢在河边翻石头找小虫、喜欢观察动物、喜欢待在水里',day:'今天我穿着潜水服下到水下五十米，任务是给一种新发现的发光深海鱼做记录。上周我们确认它是一个新物种——今天我要给它取名字，这个名字会永远留在科学文献里。下午回到船上，想着这条鱼在完全没有光的深处，孤独地活了多少万年。'},
 {id:'wildlife',title:'野生动物摄影师',emoji:'📷',tagline:'在丛林里等一张照片可以等一周',tags:['自然','动物','探索','艺术'],ifYouLike:'你喜欢在山里观察动物、喜欢等待和安静、喜欢把看到的东西记录下来',day:'我在肯尼亚草原的帐篷里住了七天，等待一头猎豹。今天它终于出现在地平线——我的手开始抖。拍了三百张，只有两张是好的。晚上发现相机卡里有只不认识的鸟，可能是新记录。靴子里进了一只蜥蜴。'},
 {id:'game',title:'游戏设计师',emoji:'🎮',tagline:'设计让玩家哭出来的那个故事',tags:['创造','故事','数字','艺术'],ifYouLike:'你喜欢玩游戏并思考"这里为什么这么设计"、喜欢讲故事、喜欢拼乐高',day:'今天我们讨论：当玩家杀死游戏里第一个敌人时，应该有愧疚感吗？这个讨论开了四个小时。游戏设计其实是在设计人的感受——恐惧、兴奋、心碎、成就感。下午我在纸上画了一百种地图形状，只为找到一个让玩家迷路时依然觉得有趣的设计。'},
 {id:'perfumer',title:'调香师',emoji:'🌸',tagline:'用气味装一瓶下雨前的空气',tags:['艺术','创造','自然','感知'],ifYouLike:'你喜欢闻东西的味道、喜欢描述感觉、对化学或艺术感兴趣',day:'今天的任务是"重现1920年代巴黎一家旧书店的气味"——旧纸、灰尘、木头、一点皮革。我的鼻子能分辨六千多种气味，但现在只有三种原料能组合出这个感觉。调香就像写诗，不同的字放在一起，意思完全变了。'},
 {id:'paleo',title:'古生物学家',emoji:'🦕',tagline:'从一块骨头还原一亿年前的世界',tags:['历史','科学','自然','探索'],ifYouLike:'你喜欢挖土、对恐龙或化石感兴趣、有耐心、喜欢像侦探一样解谜',day:'我们在内蒙古挖了三周，今天终于找到一块完整的恐龙肋骨化石。我用小刷子一毫米一毫米地清理了六个小时。这块骨头属于一只一亿两千万年前死去的恐龙。从某种意义上说，今天我握过一只恐龙的骨头。'},
 {id:'sound',title:'声音设计师',emoji:'🎧',tagline:'电影里的雷声可能是用铁板做的',tags:['音乐','创造','故事','艺术'],ifYouLike:'你喜欢音乐、喜欢玩创意、喜欢发现"这个声音是怎么做出来的"',day:'今天我要给电影里的外星人设计声音。外星人不存在，没有参考——我用杯子蘸水摩擦边缘、把蝉声录音降速、叠加大提琴泛音。外星人的"说话声"就是这三种声音混合的。电影里每一个声音背后都有这样的故事。'},
 {id:'space',title:'太空工程师',emoji:'🚀',tagline:'设计能飞出太阳系的机器',tags:['科学','数字','建造','探索'],ifYouLike:'你喜欢数学和物理、喜欢思考宇宙、喜欢解决从未有人解决过的问题',day:'旅行者一号1977年发射，现在已飞出太阳系，距地球230亿公里，还在发回信号。我的团队今天研究新型推进系统。核心问题：如何让一台机器在没有维修的情况下运行一千年。'},
 {id:'uwarch',title:'水下考古学家',emoji:'⚓',tagline:'在海底挖掘沉没的古代城市',tags:['历史','海洋','探索','科学'],ifYouLike:'你喜欢游泳和潜水、喜欢历史、喜欢像侦探一样发现线索',day:'今天我们在地中海水下三十米发现了一艘两千年前的罗马商船，船舱里有几百个完整的陶罐。我在水下只能停留四十五分钟，然后必须上来。这艘船在那里等了两千年，不在乎再等一天。'},
 {id:'eagle',title:'驯鹰师',emoji:'🦅',tagline:'中亚草原传承千年的古老技艺',tags:['自然','动物','文化','探索'],ifYouLike:'你喜欢动物、喜欢户外生活、对游牧民族文化感兴趣',day:'我的鹰叫萨尔苏克，跟了我七年。今天早上四点出门，气温零下二十五度。萨尔苏克突然冲向一只狐狸——俯冲、出击，一切在三秒内完成。驯鹰师和鹰之间不是主仆，更像是两个猎人的伙伴。'},
 {id:'climate',title:'气候科学家',emoji:'🌡️',tagline:'读懂十五万年前冰芯里藏着的天气',tags:['科学','自然','数字','探索'],ifYouLike:'你喜欢科学、关心地球的未来、喜欢用数据理解大事情',day:'今天收到了从南极运来的冰芯样本——这段冰在十五万年前形成，气泡里封存了当时的大气成分。我用细针刺破气泡，分析里面的空气。那一刻，我握着一口来自史前的空气。'},
 {id:'ethno',title:'民族志研究者',emoji:'📖',tagline:'和一个部落住一年，记录他们的生活方式',tags:['文化','故事','民族','探索'],ifYouLike:'你喜欢了解不同的人和文化、喜欢学语言、好奇别人是怎么生活的',day:'我在亚马逊雨林住了八个月，学会了一种只有三百人说的语言。这种语言里没有"昨天"和"明天"，只有"之前"和"之后"。今天村里的孩子教我用叶子折一种小船，我录了下来——这可能是这项技艺留下的唯一记录。'},

/* ═══════════════════════════════════════════════
   地图（Leaflet卫星地图）
═══════════════════════════════════════════════ */
let map=null;
let markerGroup=null;

function initMap(){
  if(map){map.invalidateSize();return;}
  map=L.map('leaflet-map',{
    center:[35,105],zoom:4,
    zoomControl:true,
    attributionControl:true,
    maxBounds:[[-90,-200],[90,200]],
    maxBoundsViscosity:0.8
  });
  /* 卫星底图（ESRI World Imagery，无需API Key） */
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
    attribution:'Tiles © Esri',
    maxZoom:18
  }).addTo(map);
  markerGroup=L.layerGroup().addTo(map);
  /* 缩放/平移时隐藏探索弹窗 */
  map.on('movestart',hideExpPopup);
  map.on('zoomstart',hideExpPopup);
  /* 点击地图任意处探索 */
  map.on('click',e=>handleMapClick(e));
  addMarkers();
}

function addMarkers(){
  if(!markerGroup)return;
  markerGroup.clearLayers();
  const locs=S.mapMode==='china'?CHINA:WORLD;
  locs.forEach(loc=>{
    const isSel=S.selLocId===loc.id;
    const icon=L.divIcon({
      html:`<div class="map-pin${isSel?' sel':''}" data-id="${loc.id}">
        <div class="pin-circle">${loc.emoji}</div>
        <div class="pin-name">${loc.name}</div>
      </div>`,
      className:'',iconSize:[0,0],iconAnchor:[0,0]
    });
    const m=L.marker([loc.lat,loc.lon],{icon,interactive:true});
    m.on('click',e=>{
      L.DomEvent.stopPropagation(e);
      selectLoc(loc.id);
    });
    markerGroup.addLayer(m);
  });
}

function selectLoc(id){
  S.selLocId=id;
  hideExpPopup();
  addMarkers();
  renderLocPanel();
}

function switchMode(m){
  S.mapMode=m;S.selLocId=null;
  el('mb-china').classList.toggle('act',m==='china');
  el('mb-world').classList.toggle('act',m==='world');
  el('loc-panel-area').innerHTML='';
  const count=m==='china'?CHINA.length:WORLD.length;
  const label=m==='china'?`${count}个城市`:`${count}个国家`;
  el('map-hint').textContent=`${label} · 点击标记看故事 · 任意处探索`;
  if(m==='china'){map.flyTo([35,105],4,{duration:1});}
  else{map.flyTo([20,10],2,{duration:1});}
  addMarkers();
  hideExpPopup();
}

/* 任意位置点击 */
function handleMapClick(e){
  const lat=e.latlng.lat,lng=e.latlng.lng;
  const {x,y}=e.containerPoint;
  hideExpPopup();
  /* 检测区域 */
  const regs=S.mapMode==='china'?CHINA_REGIONS:WORLD_REGIONS;
  let found=null;
  for(const r of regs){
    if(lng>=r.b[0]&&lat>=r.b[1]&&lng<=r.b[2]&&lat<=r.b[3]){found=r;break;}
  }
  if(!found)found={n:'浩瀚海洋',d:'海洋覆盖了地球71%的面积，深处有无数我们尚未发现的物种和秘密。马里亚纳海沟深达11034米，比珠穆朗玛峰还高。'};
  showExpPopup(lat,lng,x,y,found);
}

/* 探索弹窗 */
let _expPopupEl=null;
function showExpPopup(lat,lng,px,py,region){
  const mapDiv=el('leaflet-map');
  const rect=mapDiv.getBoundingClientRect();
  const pw=265,ph=290;
  let left=px+14,top=py+8;
  if(left+pw>rect.width-8)left=px-pw-10;
  if(top+ph>rect.height-8)top=py-ph-10;
  left=Math.max(8,left);top=Math.max(8,top);
  
  /* 图片替换说明：将 .exp-img div 替换为 <img src="图片路径"> 即可显示真实卫星/实景图片 */
  const div=document.createElement('div');
  div.className='exp-popup';div.id='exp-popup';
  div.style.left=left+'px';div.style.top=top+'px';
  div.innerHTML=`
  <div class="exp-drag">
    <div style="font-size:13px;font-weight:600;color:var(--text)">${region.n}</div>
    <button onclick="hideExpPopup()" class="icon-btn" style="font-size:15px">✕</button>
  </div>
  <div class="exp-coords">📍 ${Math.abs(lat).toFixed(2)}°${lat>=0?'N':'S'}, ${Math.abs(lng).toFixed(2)}°${lng>=0?'E':'W'}</div>
  <div class="exp-img">
    <span>📸</span>
    图片占位区<br><small>可替换为真实图片</small>
  </div>
  <div style="font-size:12px;color:var(--text2);line-height:1.75">${region.d}</div>`;
  
  /* 拖动 */
  let drag=false,sx,sy,ox,oy;
  div.querySelector('.exp-drag').addEventListener('mousedown',e=>{
    drag=true;sx=e.clientX;sy=e.clientY;ox=parseInt(div.style.left);oy=parseInt(div.style.top);
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{if(!drag)return;div.style.left=(ox+e.clientX-sx)+'px';div.style.top=(oy+e.clientY-sy)+'px';});
  document.addEventListener('mouseup',()=>drag=false);
  
  mapDiv.appendChild(div);
  _expPopupEl=div;
}

function hideExpPopup(){
  if(_expPopupEl){_expPopupEl.remove();_expPopupEl=null;}
}

/* 位置面板 */
function renderLocPanel(){
  const area=el('loc-panel-area');if(!area)return;
  const locs=S.mapMode==='china'?CHINA:WORLD;
  const loc=locs.find(l=>l.id===S.selLocId);
  if(!loc){area.innerHTML='';return;}
  /* 
   * 【图片替换说明】
   * 将下方 .img-ph div 替换为：
   * <img src="images/${loc.id}.jpg" style="width:100%;height:130px;object-fit:cover;border-radius:var(--r);margin-bottom:12px">
   * 或在 CHINA/WORLD 数据中每条加 image 字段，用 loc.image 引用。
   */
  area.innerHTML=`
  <div class="loc-panel">
    <div class="lp-head">
      <div>
        <div style="font-size:26px">${loc.emoji}</div>
        <div style="font-size:18px;font-weight:600;color:var(--text);margin-top:5px">${loc.name}</div>
        ${loc.country?`<div style="font-size:11px;color:var(--text3);margin-top:1px">${loc.country}</div>`:''}
      </div>
      <button class="icon-btn" onclick="S.selLocId=null;el('loc-panel-area').innerHTML='';addMarkers()">✕</button>
    </div>
    <div class="lp-scroll">
      <div class="img-ph"><div class="img-ph-icon">📸</div>图片占位区（可替换为真实图片）</div>
      <div style="font-size:12px;color:var(--accent);font-style:italic;line-height:1.6;margin-bottom:12px">「${loc.tagline}」</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.9;margin-bottom:16px">${loc.story}</div>
      <div style="font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.5px;margin-bottom:7px">值得探索的事</div>
      ${loc.wonders.map(w=>`<div class="wonder-row"><span style="color:var(--accent);font-size:11px;flex-shrink:0">→</span>${w}</div>`).join('')}
      <div style="margin-top:11px;display:flex;flex-wrap:wrap;gap:3px">${(loc.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
    <div class="lp-foot">
      <button class="primary-btn" onclick="openModal('location','${loc.id}')">✦ 记录孩子的兴趣</button>
    </div>
  </div>`;
}

                <div style="min-width:0">
                  <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.refName}</div>
                  <div style="font-size:11px;color:var(--text3)">${r.type==='location'?'地图位置':'职业探索'}</div>
                </div>
              </div>
              <div style="display:flex;align-items:flex-start;gap:4px;flex-shrink:0">
                <div style="text-align:right">
                  <div style="font-size:11px;color:var(--text3)">${r.date}</div>
                  <div style="font-size:11px;color:${r.isGroup?'var(--accent2)':'var(--accent)'};font-weight:500;margin-top:1px">${r.isGroup?'👥 群体':'👤 '+(names.join('、')||'未知')}</div>
                </div>
                <button class="rec-del-btn" onclick="deleteRecord('${r.id}')" title="删除">🗑</button>
              </div>
            </div>
            ${r.note?`<div style="font-size:12px;color:var(--text2);padding:8px 10px;background:var(--surface2);border-radius:6px;line-height:1.7;margin-bottom:8px">「${r.note}」</div>`:''}
            <div style="display:flex;flex-wrap:wrap;gap:3px">${(r.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          </div>`;
        }).join('')}
    </div>
  </div>`;
}

function addKid(){const inp=el('kid-input');const n=(inp?.value||'').trim();if(!n)return;S.kids.push({id:genId(),name:n});render();}
function removeKid(id){if(!confirm('确定删除这个孩子的记录？'))return;S.kids=S.kids.filter(k=>k.id!==id);S.records=S.records.filter(r=>!r.childIds?.includes(id));if(S.recFilter===id)S.recFilter='all';render();}
function deleteRecord(id){
  if(!confirm('确定删除这条记录？'))return;
  const card=el('rc-'+id);
  if(card){card.style.animation='slideOut .2s ease-out forwards';setTimeout(()=>{S.records=S.records.filter(r=>r.id!==id);render();},200);}
  else{S.records=S.records.filter(r=>r.id!==id);render();}
}

/* ═══════════════════════════════════════════════
   模态框（无JSON参数传递，彻底修复bug）
═══════════════════════════════════════════════ */
function openModal(type,refId){
  let item=type==='location'?(S.mapMode==='china'?CHINA:WORLD).find(l=>l.id===refId):CAREERS.find(c=>c.id===refId);
  if(!item){showToast('数据未找到','error');return;}
  M.open=true;M.type=type;M.refId=refId;
  M.refName=item.name||item.title;M.refEmoji=item.emoji;M.tags=item.tags||[];
  M.isGroup=false;M.selKids=[];M.note='';
  el('modal-overlay').classList.remove('hidden');
  renderModalContent();
}
function closeModal(){M.open=false;el('modal-overlay').classList.add('hidden');}
function handleOverlayClick(e){if(e.target===el('modal-overlay'))closeModal();}
function setModalGroup(v){M.isGroup=v;renderModalContent();}
function toggleModalKid(id){const i=M.selKids.indexOf(id);if(i>=0)M.selKids.splice(i,1);else M.selKids.push(id);renderModalContent();}
function goAddKid(){closeModal();switchTab('records');setTimeout(()=>{const inp=el('kid-input');if(inp)inp.focus();},100);}

function renderModalContent(){
  const box=el('modal-box');if(!box)return;
  const can=M.isGroup||M.selKids.length>0;
  box.innerHTML=`
  <div style="margin-bottom:15px">
    <div style="font-size:11px;color:var(--text3);letter-spacing:.5px;margin-bottom:3px">📝 记录兴趣发现</div>
    <div style="font-size:18px;font-weight:600;color:var(--text)">${M.refEmoji} ${M.refName}</div>
    ${M.tags.length?`<div style="margin-top:7px;display:flex;flex-wrap:wrap;gap:3px">${M.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
  </div>
  <div style="margin-bottom:13px">
    <div style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:7px">这次发现属于谁？</div>
    <div class="opt-row">
      <button class="opt-btn ${!M.isGroup?'act':''}" onclick="setModalGroup(false)">
        <div class="opt-btn-title">某个孩子</div><div class="opt-btn-sub">个人兴趣</div>
      </button>
      <button class="opt-btn ${M.isGroup?'act':''}" onclick="setModalGroup(true)">
        <div class="opt-btn-title">全班/多人</div><div class="opt-btn-sub">群体兴趣</div>
      </button>
    </div>
  </div>
  ${!M.isGroup?`<div style="margin-bottom:13px">
    <div style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:7px">选择孩子（可多选）</div>
    ${S.kids.length===0
      ?`<div style="padding:14px;background:rgba(184,116,40,.07);border-radius:var(--r);border:1px dashed rgba(184,116,40,.3);text-align:center">
         <div style="font-size:22px;margin-bottom:5px">👶</div>
         <div style="font-size:12px;color:var(--text2);margin-bottom:8px">还没有添加孩子名单</div>
         <button onclick="goAddKid()" style="padding:6px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-family:inherit">去添加孩子 →</button>
       </div>`
      :`<div class="chip-wrap">${S.kids.map(k=>`<button class="chip ${M.selKids.includes(k.id)?'sel':''}" onclick="toggleModalKid('${k.id}')">${k.name}</button>`).join('')}</div>`
    }
  </div>`:''}
  <div style="margin-bottom:15px">
    <div style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px">💭 备注观察（选填）</div>
    <textarea class="m-textarea" id="modal-note" placeholder="• 孩子看到什么时眼睛亮了？&#10;• 说了什么让你印象深刻的话？&#10;• 问了什么有趣的问题？" oninput="M.note=this.value">${M.note}</textarea>
  </div>
  <div class="m-actions">
    <button class="btn-cancel" onclick="closeModal()">取消</button>
    <button class="btn-save" id="modal-save-btn" onclick="saveRecord()" ${can?'':'disabled'}>✦ 保存记录</button>
  </div>`;
}

function saveRecord(){
  M.note=el('modal-note')?.value||M.note;
  const can=M.isGroup||M.selKids.length>0;
  if(!can){const b=el('modal-save-btn');if(b){b.style.animation='shake .35s';setTimeout(()=>b.style.animation='',380);}return;}
  S.records.unshift({id:genId(),type:M.type,refId:M.refId,refName:M.refName,refEmoji:M.refEmoji,
    tags:[...M.tags],isGroup:M.isGroup,childIds:M.isGroup?[]:[...M.selKids],
    note:M.note.trim(),date:new Date().toISOString().split('T')[0]});
  closeModal();render();
  const who=M.isGroup?'全班':M.selKids.map(id=>S.kids.find(k=>k.id===id)?.name).filter(Boolean).join('、')||'孩子';
  showToast(`已为 ${who} 记录「${M.refName}」的兴趣！`,'success');
}

/* ═══════════════════════════════════════════════
   导入/导出
═══════════════════════════════════════════════ */
function doExport(){
  const b=new Blob([JSON.stringify({v:2,kids:S.kids,records:S.records,at:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='兴趣记录_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')+'.json';a.click();
  showToast('数据已导出！','success');
}
function doImport(){
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.kids)S.kids=d.kids;if(d.records)S.records=d.records;render();showToast('数据已导入！','success');}
      catch{showToast('文件格式不正确','error');}};r.readAsText(f);};i.click();
}

/* Toast */
function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=(type==='success'?'✓ ':'✕ ')+msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .25s ease-out forwards';setTimeout(()=>t.remove(),260);},2200);
}

/* ═══════════════════════════════════════════════
   导航 & 渲染
═══════════════════════════════════════════════ */
function switchTab(tab){
  S.tab=tab;S.selLocId=null;S.selCareerId=null;
  ['map','careers','records'].forEach(x=>el('nb-'+x).classList.toggle('act',x===tab));
  if(tab==='map'){
    el('map-container').style.display='flex';el('content').style.display='none';
    initMap(); // 首次或已存在时调用invalidateSize
  }else{
    el('map-container').style.display='none';el('content').style.display='flex';
    const c=el('content');c.innerHTML='';
    if(tab==='careers')renderCareers(c);else renderRecords(c);
  }
}
function render(){
  if(S.tab==='map'){renderLocPanel();}
  else{const c=el('content');c.innerHTML='';if(S.tab==='careers')renderCareers(c);else renderRecords(c);}
}

/* 初始化 */
switchTab('map');
</script>
</body>
